<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 일일 퀘스트 도우미 - 설정</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            color: #223;
        }

        .container {
            width: min(960px, calc(100% - 32px));
            margin: 28px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 26px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(to bottom, #3c66a6, #2d4f84);
            color: white;
            padding: 20px 30px;
            text-align: center;
            position: relative;
            font-size: 24px;
            font-weight: bold;
        }

        .back-btn,
        .save-btn {
            position: absolute;
            top: 14px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
            padding: 10px 16px;
        }

        .back-btn {
            left: 20px;
            background: transparent;
            color: white;
        }

        .save-btn {
            right: 20px;
            background: #3b73bd;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .content {
            padding: 26px;
        }

        .login-status-box {
            margin-bottom: 20px;
            padding: 14px 16px;
            border: 1px solid #d5dbe4;
            border-radius: 6px;
            background: #f8fafc;
            color: #23497c;
            font-size: 16px;
        }

        .top-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .top-row input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
        }

        .top-row button,
        .secondary-btn,
        .danger-btn,
        .mini-btn,
        .ghost-btn {
            border: none;
            cursor: pointer;
            border-radius: 6px;
        }

        .top-row button,
        .secondary-btn {
            background: #3b73bd;
            color: white;
            padding: 12px 16px;
            font-size: 15px;
        }

        .ghost-btn {
            background: #eef4fb;
            color: #23497c;
            padding: 8px 12px;
        }

        .mini-btn {
            background: #eef4fb;
            color: #23497c;
            padding: 8px 12px;
            font-size: 13px;
        }

        .danger-btn {
            background: #d84b3d;
            color: white;
            padding: 8px 12px;
            font-size: 13px;
        }

        .game-card {
            border: 1px solid #d5dbe4;
            border-radius: 8px;
            margin-bottom: 18px;
            background: #fff;
            overflow: hidden;
        }

        .game-title-row {
            background: #f1f3f7;
            border-bottom: 1px solid #d5dbe4;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .game-title-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .collapse-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            background: #dfe8f5;
            color: #23497c;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }

        .game-title-text {
            font-size: 22px;
            font-weight: bold;
            color: #23497c;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .game-title-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .game-content {
            padding: 18px;
        }

        .collapsed .game-content {
            display: none;
        }

        .quest-add-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            align-items: center;
            flex-wrap: wrap;
        }

        .quest-add-row input {
            flex: 1 1 280px;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
        }

        .type-toggle {
            display: flex;
            border: 1px solid #cfd6df;
            border-radius: 6px;
            overflow: hidden;
        }

        .type-toggle button {
            padding: 10px 14px;
            border: none;
            background: #f4f6fa;
            cursor: pointer;
            font-size: 14px;
        }

        .type-toggle button.active {
            background: #3b73bd;
            color: white;
        }

        .quest-section {
            margin-top: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .quest-section-label {
            font-size: 18px;
            font-weight: bold;
            color: #23497c;
        }

        .reset-inline-box {
            display: none;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            background: #f8fafc;
            border: 1px solid #d5dbe4;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .reset-inline-box.show {
            display: flex;
        }

        .reset-inline-box input[type="time"] {
            padding: 8px 10px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
        }

        .quest-list {
            min-height: 16px;
        }

        .quest-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border: 1px solid #d5dbe4;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #fff;
        }

        .quest-item.dragging {
            opacity: 0.45;
        }

        .quest-item.drag-over {
            border-color: #3b73bd;
            background: #f3f8ff;
        }

        .quest-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1;
        }

        .drag-handle {
            font-size: 18px;
            color: #6b7c93;
            cursor: grab;
            user-select: none;
        }

        .quest-type-badge {
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 12px;
            color: white;
            flex-shrink: 0;
        }

        .daily-badge { background: #57a63e; }
        .weekly-badge { background: #5c94d6; }

        .quest-text {
            font-size: 16px;
            word-break: break-word;
        }

        .quest-actions,
        .game-delete-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .game-delete-row {
            justify-content: flex-end;
            margin-top: 18px;
        }

        .empty-message {
            color: #777;
            font-size: 15px;
            padding: 10px 4px;
        }

        @media (max-width: 720px) {
            .header {
                padding-top: 62px;
            }

            .back-btn,
            .save-btn {
                top: 12px;
            }

            .top-row,
            .quest-add-row,
            .section-header,
            .game-title-row {
                flex-wrap: wrap;
            }

            .game-title-right {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button class="back-btn" onclick="goBack()">← 돌아가기</button>
        설정
        <button id="saveBtn" class="save-btn" onclick="saveAndGoMain()">저장</button>
    </div>

    <div class="content">
        <div id="loginStatusBox" class="login-status-box">상태를 확인하는 중입니다.</div>

        <div class="top-row">
            <input type="text" id="newGameName" placeholder="추가할 게임 이름을 입력하세요">
            <button type="button" onclick="addGame()">+ 게임 추가</button>
        </div>

        <div id="gameList"></div>
    </div>
</div>

<script>
    const gameApi = "/api/games";
    const questApi = "/api/quests";
    const authApi = "/api/auth";
    const GUEST_STORAGE_KEY = "dailyQuestGuestData";

    let games = [];
    let isLoggedIn = false;
    const selectedQuestTypeByGame = {};
    const collapsedGameIds = new Set();
    const resetPanelState = {};
    let draggedQuestInfo = null;
    let isSavingQuestOrder = false;

    let guestGames = [];
    let guestQuestsByGame = {};
    let guestGameIdSeq = 1;
    let guestQuestIdSeq = 1;

    function setSaveButtonDisabled(disabled) {
        const saveBtn = document.getElementById("saveBtn");
        if (saveBtn) {
            saveBtn.disabled = disabled;
            saveBtn.textContent = disabled ? "저장 중..." : "저장";
        }
    }

    function loadGuestDataFromSession() {
        try {
            const raw = sessionStorage.getItem(GUEST_STORAGE_KEY);
            if (!raw) {
                guestGames = [];
                guestQuestsByGame = {};
                guestGameIdSeq = 1;
                guestQuestIdSeq = 1;
                return;
            }
            const parsed = JSON.parse(raw);
            guestGames = Array.isArray(parsed.guestGames) ? parsed.guestGames : [];
            guestQuestsByGame = parsed.guestQuestsByGame && typeof parsed.guestQuestsByGame === "object" ? parsed.guestQuestsByGame : {};
            guestGameIdSeq = Number.isInteger(parsed.guestGameIdSeq) ? parsed.guestGameIdSeq : 1;
            guestQuestIdSeq = Number.isInteger(parsed.guestQuestIdSeq) ? parsed.guestQuestIdSeq : 1;
        } catch (error) {
            console.error("게스트 데이터 불러오기 실패:", error);
        }
    }

    function saveGuestDataToSession() {
        sessionStorage.setItem(GUEST_STORAGE_KEY, JSON.stringify({
            guestGames,
            guestQuestsByGame,
            guestGameIdSeq,
            guestQuestIdSeq
        }));
    }

    function getCurrentGames() {
        return isLoggedIn ? games : guestGames;
    }

    function getQuestsForGame(gameId) {
        const game = getCurrentGames().find(g => g.id === gameId);
        if (!game) return [];
        if (Array.isArray(game.quests)) return game.quests;
        if (!isLoggedIn) return guestQuestsByGame[gameId] || [];
        return [];
    }

    function getResetValue(game, type) {
        return type === "DAILY" ? (game.dailyResetTime || "00:00") : (game.weeklyResetTime || "00:00");
    }

    function setQuestType(gameId, type) {
        selectedQuestTypeByGame[gameId] = type;
        renderGameList();
    }

    function toggleCollapse(gameId) {
        if (collapsedGameIds.has(gameId)) collapsedGameIds.delete(gameId);
        else collapsedGameIds.add(gameId);
        renderGameList();
    }

    function toggleResetPanel(gameId, type) {
        const key = `${gameId}-${type}`;
        resetPanelState[key] = !resetPanelState[key];
        renderGameList();
    }

    async function checkLoginStatus() {
        loadGuestDataFromSession();
        try {
            const response = await fetch(`${authApi}/me`, { credentials: "include" });
            if (!response.ok) throw new Error("로그인 상태 조회 실패");
            const data = await response.json();
            isLoggedIn = !!data.loggedIn;

            const box = document.getElementById("loginStatusBox");
            if (isLoggedIn) {
                box.textContent = `${data.username} 님의 설정 화면입니다.`;
                await loadGames();
            } else {
                box.textContent = "게스트 상태입니다. 브라우저 세션 동안만 설정이 유지됩니다.";
                games = [];
                renderGameList();
            }
        } catch (error) {
            console.error("로그인 상태 확인 실패:", error);
            isLoggedIn = false;
            document.getElementById("loginStatusBox").textContent = "게스트 상태입니다. 브라우저 세션 동안만 설정이 유지됩니다.";
            renderGameList();
        }
    }

    async function loadGames() {
        try {
            const response = await fetch(gameApi, { credentials: "include" });
            if (!response.ok) throw new Error("게임 목록 조회 실패");
            const loadedGames = await response.json();

            const enrichedGames = [];
            for (const game of loadedGames) {
                const questRes = await fetch(`${questApi}/game/${game.id}`, { credentials: "include" });
                if (!questRes.ok) throw new Error("퀘스트 조회 실패");
                const quests = await questRes.json();
                enrichedGames.push({ ...game, quests });
            }

            games = enrichedGames;
            renderGameList();
        } catch (error) {
            console.error("게임 목록 불러오기 실패:", error);
            alert(`게임 목록을 불러오지 못했습니다.\n${error.message}`);
        }
    }

    function renderGameList() {
        const gameList = document.getElementById("gameList");
        gameList.innerHTML = "";

        const currentGames = getCurrentGames();
        if (!currentGames.length) {
            gameList.innerHTML = '<div class="empty-message">등록된 게임이 없습니다.</div>';
            return;
        }

        currentGames.forEach(game => {
            const currentType = selectedQuestTypeByGame[game.id] || "DAILY";
            const allQuests = getQuestsForGame(game.id);
            const dailyQuests = allQuests.filter(q => q.type === "DAILY");
            const weeklyQuests = allQuests.filter(q => q.type === "WEEKLY");
            const dailyPanelOpen = !!resetPanelState[`${game.id}-DAILY`];
            const weeklyPanelOpen = !!resetPanelState[`${game.id}-WEEKLY`];
            const collapsed = collapsedGameIds.has(game.id);

            const card = document.createElement("div");
            card.className = `game-card ${collapsed ? 'collapsed' : ''}`;

            card.innerHTML = `
                <div class="game-title-row">
                    <div class="game-title-left">
                        <button type="button" class="collapse-btn" onclick="toggleCollapse(${game.id})" title="접기/펼치기">≣</button>
                        <div class="game-title-text">${escapeHtml(game.name)}</div>
                    </div>
                    <div class="game-title-right">
                        <button type="button" class="mini-btn" onclick="renameGame(${game.id})">이름 수정</button>
                    </div>
                </div>
                <div class="game-content">
                    <div class="quest-add-row">
                        <input type="text" id="questInput-${game.id}" placeholder="퀘스트 내용을 입력하세요">
                        <div class="type-toggle">
                            <button type="button" class="${currentType === 'DAILY' ? 'active' : ''}" onclick="setQuestType(${game.id}, 'DAILY')">일일</button>
                            <button type="button" class="${currentType === 'WEEKLY' ? 'active' : ''}" onclick="setQuestType(${game.id}, 'WEEKLY')">주간</button>
                        </div>
                        <button type="button" class="secondary-btn" onclick="addQuest(${game.id})">+ 퀘스트 추가</button>
                    </div>

                    <div class="quest-section">
                        <div class="section-header">
                            <div class="quest-section-label">일일 퀘스트</div>
                            <button type="button" class="mini-btn" onclick="toggleResetPanel(${game.id}, 'DAILY')">초기화 시간</button>
                        </div>
                        <div class="reset-inline-box ${dailyPanelOpen ? 'show' : ''}">
                            <span>일일 초기화 시간</span>
                            <input type="time" id="dailyResetTime-${game.id}" value="${escapeHtml(getResetValue(game, 'DAILY'))}">
                            <button type="button" class="mini-btn" onclick="saveSingleResetTime(${game.id}, 'DAILY')">저장</button>
                        </div>
                        <div class="quest-list" data-game-id="${game.id}" data-type="DAILY">
                            ${renderQuestList(dailyQuests, game.id, 'DAILY')}
                        </div>
                    </div>

                    <div class="quest-section">
                        <div class="section-header">
                            <div class="quest-section-label">주간 퀘스트</div>
                            <button type="button" class="mini-btn" onclick="toggleResetPanel(${game.id}, 'WEEKLY')">초기화 시간</button>
                        </div>
                        <div class="reset-inline-box ${weeklyPanelOpen ? 'show' : ''}">
                            <span>주간 초기화 시간</span>
                            <input type="time" id="weeklyResetTime-${game.id}" value="${escapeHtml(getResetValue(game, 'WEEKLY'))}">
                            <button type="button" class="mini-btn" onclick="saveSingleResetTime(${game.id}, 'WEEKLY')">저장</button>
                        </div>
                        <div class="quest-list" data-game-id="${game.id}" data-type="WEEKLY">
                            ${renderQuestList(weeklyQuests, game.id, 'WEEKLY')}
                        </div>
                    </div>

                    <div class="game-delete-row">
                        <button type="button" class="danger-btn" onclick="deleteGame(${game.id})">게임 삭제</button>
                    </div>
                </div>
            `;

            gameList.appendChild(card);
        });

        bindDragAndDrop();
    }

    function renderQuestList(quests, gameId, type) {
        if (!quests.length) {
            return `<div class="empty-message">등록된 ${type === 'DAILY' ? '일일' : '주간'} 퀘스트가 없습니다.</div>`;
        }

        return quests.map((q, index) => `
            <div class="quest-item" draggable="true" data-quest-id="${q.id}" data-game-id="${gameId}" data-type="${type}" data-index="${index}">
                <div class="quest-left">
                    <span class="drag-handle">☰</span>
                    <span class="quest-type-badge ${type === 'DAILY' ? 'daily-badge' : 'weekly-badge'}">${type === 'DAILY' ? '일일' : '주간'}</span>
                    <span class="quest-text">${escapeHtml(q.content)}</span>
                </div>
                <div class="quest-actions">
                    <button type="button" class="mini-btn" onclick="renameQuest(${q.id}, ${gameId})">수정</button>
                    <button type="button" class="danger-btn" onclick="deleteQuest(${q.id}, ${gameId})">삭제</button>
                </div>
            </div>
        `).join("");
    }

    function bindDragAndDrop() {
        document.querySelectorAll('.quest-item').forEach(item => {
            item.addEventListener('dragstart', event => {
                draggedQuestInfo = {
                    questId: Number(item.dataset.questId),
                    gameId: Number(item.dataset.gameId),
                    type: item.dataset.type,
                    index: Number(item.dataset.index)
                };
                item.classList.add('dragging');
                event.dataTransfer.effectAllowed = 'move';
            });

            item.addEventListener('dragend', () => {
                item.classList.remove('dragging');
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                draggedQuestInfo = null;
            });

            item.addEventListener('dragover', event => {
                if (!draggedQuestInfo) return;
                if (Number(item.dataset.gameId) !== draggedQuestInfo.gameId || item.dataset.type !== draggedQuestInfo.type) return;
                event.preventDefault();
                item.classList.add('drag-over');
            });

            item.addEventListener('dragleave', () => {
                item.classList.remove('drag-over');
            });

            item.addEventListener('drop', async event => {
                event.preventDefault();
                item.classList.remove('drag-over');
                if (!draggedQuestInfo) return;
                const targetIndex = Number(item.dataset.index);
                await moveQuest(draggedQuestInfo, targetIndex);
            });
        });

        document.querySelectorAll('.quest-list').forEach(list => {
            list.addEventListener('dragover', event => {
                if (!draggedQuestInfo) return;
                if (Number(list.dataset.gameId) !== draggedQuestInfo.gameId || list.dataset.type !== draggedQuestInfo.type) return;
                event.preventDefault();
            });

            list.addEventListener('drop', async event => {
                if (!draggedQuestInfo) return;
                event.preventDefault();
                const items = [...list.querySelectorAll('.quest-item')];
                if (!items.length) return;
                const targetIndex = items.length - 1;
                await moveQuest(draggedQuestInfo, targetIndex);
            });
        });
    }

    async function moveQuest(dragInfo, targetIndex) {
        if (!dragInfo) return;

        if (!isLoggedIn) {
            const all = guestQuestsByGame[dragInfo.gameId] || [];
            const sameTypeList = all.filter(q => q.type === dragInfo.type);
            const moving = sameTypeList.splice(dragInfo.index, 1)[0];
            if (!moving) return;

            sameTypeList.splice(targetIndex, 0, moving);

            sameTypeList.forEach((q, idx) => {
                q.sortOrder = idx;
            });

            const otherTypeList = all.filter(q => q.type !== dragInfo.type);
            guestQuestsByGame[dragInfo.gameId] = [...sameTypeList, ...otherTypeList];
            saveGuestDataToSession();
            renderGameList();
            return;
        }

        try {
            isSavingQuestOrder = true;
            setSaveButtonDisabled(true);

            const response = await fetch(`${questApi}/${dragInfo.questId}/order`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ sortOrder: targetIndex })
            });

            const text = await response.text();
            if (!response.ok) {
                throw new Error(text || '순서 변경 실패');
            }

            await loadGames();
        } catch (error) {
            console.error('퀘스트 순서 변경 실패:', error);
            alert(`퀘스트 순서 변경에 실패했습니다.\n${error.message}`);
        } finally {
            isSavingQuestOrder = false;
            setSaveButtonDisabled(false);
        }
    }

    async function addGame() {
        const input = document.getElementById('newGameName');
        const gameName = input.value.trim();
        if (!gameName) {
            alert('게임 이름을 입력해주세요.');
            return;
        }

        const exists = getCurrentGames().some(game => game.name.toLowerCase() === gameName.toLowerCase());
        if (exists) {
            alert('이미 추가된 게임입니다.');
            return;
        }

        if (!isLoggedIn) {
            const gameId = guestGameIdSeq++;
            guestGames.push({ id: gameId, name: gameName, dailyResetTime: '00:00', weeklyResetTime: '00:00', quests: [] });
            guestQuestsByGame[gameId] = [];
            saveGuestDataToSession();
            input.value = '';
            renderGameList();
            return;
        }

        try {
            const response = await fetch(gameApi, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ name: gameName, dailyResetTime: '00:00', weeklyResetTime: '00:00' })
            });
            const text = await response.text();
            if (!response.ok) throw new Error(text || '게임 추가 실패');
            input.value = '';
            await loadGames();
        } catch (error) {
            console.error('게임 추가 실패:', error);
            alert(`게임 추가에 실패했습니다.\n${error.message}`);
        }
    }

    async function renameGame(gameId) {
        const game = getCurrentGames().find(g => g.id === gameId);
        if (!game) return;

        const nextName = prompt('수정할 게임 이름을 입력하세요.', game.name);
        if (nextName === null) return;

        const trimmed = nextName.trim();
        if (!trimmed) {
            alert('게임 이름을 입력해주세요.');
            return;
        }

        if (!isLoggedIn) {
            game.name = trimmed;
            saveGuestDataToSession();
            renderGameList();
            return;
        }

        try {
            const response = await fetch(`${gameApi}/${gameId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ name: trimmed })
            });
            const text = await response.text();
            if (!response.ok) throw new Error(text || '게임 이름 수정 실패');
            await loadGames();
        } catch (error) {
            console.error('게임 이름 수정 실패:', error);
            alert(`게임 이름 수정에 실패했습니다.\n${error.message}`);
        }
    }

    async function saveSingleResetTime(gameId, type) {
        const game = getCurrentGames().find(g => g.id === gameId);
        if (!game) return;

        const dailyResetTime = document.getElementById(`dailyResetTime-${gameId}`)?.value || game.dailyResetTime || '00:00';
        const weeklyResetTime = document.getElementById(`weeklyResetTime-${gameId}`)?.value || game.weeklyResetTime || '00:00';

        if (!isLoggedIn) {
            game.dailyResetTime = dailyResetTime;
            game.weeklyResetTime = weeklyResetTime;
            saveGuestDataToSession();
            alert(`${type === 'DAILY' ? '일일' : '주간'} 초기화 시간이 저장되었습니다.`);
            return;
        }

        try {
            const response = await fetch(`${gameApi}/${gameId}/reset-times`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ dailyResetTime, weeklyResetTime })
            });
            const text = await response.text();
            if (!response.ok) throw new Error(text || '초기화 시간 저장 실패');
            await loadGames();
            alert(`${type === 'DAILY' ? '일일' : '주간'} 초기화 시간이 저장되었습니다.`);
        } catch (error) {
            console.error('초기화 시간 저장 실패:', error);
            alert(`초기화 시간 저장에 실패했습니다.\n${error.message}`);
        }
    }

    async function addQuest(gameId) {
        const input = document.getElementById(`questInput-${gameId}`);
        const content = input.value.trim();
        const type = selectedQuestTypeByGame[gameId] || 'DAILY';

        if (!content) {
            alert('퀘스트 내용을 입력해주세요.');
            return;
        }

        if (!isLoggedIn) {
            if (!guestQuestsByGame[gameId]) guestQuestsByGame[gameId] = [];
            guestQuestsByGame[gameId].push({
                id: guestQuestIdSeq++,
                content,
                type,
                completed: false,
                sortOrder: guestQuestsByGame[gameId].filter(q => q.type === type).length
            });
            saveGuestDataToSession();
            input.value = '';
            renderGameList();
            return;
        }

        try {
            const response = await fetch(questApi, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ gameId, content, type })
            });
            const text = await response.text();
            if (!response.ok) throw new Error(text || '퀘스트 추가 실패');
            input.value = '';
            await loadGames();
        } catch (error) {
            console.error('퀘스트 추가 실패:', error);
            alert(`퀘스트 추가에 실패했습니다.\n${error.message}`);
        }
    }

    async function renameQuest(questId, gameId) {
        const quest = getQuestsForGame(gameId).find(q => q.id === questId);
        if (!quest) return;

        const nextText = prompt('수정할 퀘스트 내용을 입력하세요.', quest.content);
        if (nextText === null) return;

        const trimmed = nextText.trim();
        if (!trimmed) {
            alert('퀘스트 내용을 입력해주세요.');
            return;
        }

        if (!isLoggedIn) {
            quest.content = trimmed;
            saveGuestDataToSession();
            renderGameList();
            return;
        }

        try {
            const response = await fetch(`${questApi}/${questId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ content: trimmed })
            });
            const text = await response.text();
            if (!response.ok) throw new Error(text || '퀘스트 수정 실패');
            await loadGames();
        } catch (error) {
            console.error('퀘스트 수정 실패:', error);
            alert(`퀘스트 수정에 실패했습니다.\n${error.message}`);
        }
    }

    async function deleteQuest(questId, gameId) {
        if (!confirm('이 퀘스트를 삭제할까요?')) return;

        if (!isLoggedIn) {
            guestQuestsByGame[gameId] = (guestQuestsByGame[gameId] || []).filter(q => q.id !== questId);
            saveGuestDataToSession();
            renderGameList();
            return;
        }

        try {
            const response = await fetch(`${questApi}/${questId}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            const text = await response.text();
            if (!response.ok) throw new Error(text || '퀘스트 삭제 실패');
            await loadGames();
        } catch (error) {
            console.error('퀘스트 삭제 실패:', error);
            alert(`퀘스트 삭제에 실패했습니다.\n${error.message}`);
        }
    }

    async function deleteGame(gameId) {
        if (!confirm('이 게임과 해당 퀘스트를 삭제할까요?')) return;

        if (!isLoggedIn) {
            guestGames = guestGames.filter(g => g.id !== gameId);
            delete guestQuestsByGame[gameId];
            saveGuestDataToSession();
            renderGameList();
            return;
        }

        try {
            const response = await fetch(`${gameApi}/${gameId}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            const text = await response.text();
            if (!response.ok) throw new Error(text || '게임 삭제 실패');
            await loadGames();
        } catch (error) {
            console.error('게임 삭제 실패:', error);
            alert(`게임 삭제에 실패했습니다.\n${error.message}`);
        }
    }

    function saveAndGoMain() {
        if (isSavingQuestOrder) {
            alert('퀘스트 순서를 저장 중입니다. 잠시 후 다시 눌러주세요.');
            return;
        }
        window.location.href = '/index.html';
    }

    function goBack() {
        if (isSavingQuestOrder) {
            alert('퀘스트 순서를 저장 중입니다. 잠시 후 다시 이동해주세요.');
            return;
        }
        window.location.href = '/index.html';
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    window.addEventListener('load', checkLoginStatus);
</script>
