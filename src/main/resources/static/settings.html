<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 일일 퀘스트 도우미</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
        }

        .container {
            width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(to bottom, #3c66a6, #2d4f84);
            color: white;
            padding: 20px 30px;
            text-align: center;
            position: relative;
            font-size: 24px;
            font-weight: bold;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 18px;
            background: transparent;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        .save-btn {
            position: absolute;
            right: 20px;
            top: 14px;
            background: #3b73bd;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
        }

        .content {
            padding: 30px;
        }

        .login-status-box {
            margin-bottom: 20px;
            padding: 14px 16px;
            border: 1px solid #d5dbe4;
            border-radius: 6px;
            background: #f8fafc;
            color: #23497c;
            font-size: 16px;
        }

        .top-row {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .top-row input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
        }

        .top-row button {
            padding: 12px 18px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #3b73bd;
            color: white;
            cursor: pointer;
        }

        .game-card {
            border: 1px solid #d5dbe4;
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
            background: #fff;
        }

        .game-title {
            background: #f1f3f7;
            padding: 16px 20px;
            font-size: 22px;
            font-weight: bold;
            color: #23497c;
            border-bottom: 1px solid #d5dbe4;
        }

        .game-content {
            padding: 20px;
        }

        .reset-box {
            border: 1px solid #d5dbe4;
            border-radius: 6px;
            background: #f8fafc;
            padding: 16px;
            margin-bottom: 20px;
        }

        .reset-title {
            font-size: 17px;
            font-weight: bold;
            color: #23497c;
            margin-bottom: 12px;
        }

        .reset-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .reset-item {
            flex: 1;
            min-width: 220px;
        }

        .reset-item label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #23497c;
        }

        .reset-item input[type="time"] {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .reset-help {
            margin-top: 6px;
            font-size: 12px;
            color: #666;
        }

        .reset-action-row {
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .reset-confirm-btn {
            background: #3b73bd;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .reset-save-message {
            font-size: 14px;
            color: #2e7d32;
            font-weight: bold;
        }

        .quest-add-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        .quest-add-row input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
        }

        .type-toggle {
            display: flex;
            border: 1px solid #cfd6df;
            border-radius: 6px;
            overflow: hidden;
        }

        .type-toggle button {
            padding: 10px 14px;
            border: none;
            background: #f4f6fa;
            cursor: pointer;
            font-size: 14px;
        }

        .type-toggle button.active {
            background: #3b73bd;
            color: white;
        }

        .quest-add-row .add-btn {
            background: #3b73bd;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .quest-section-label {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #23497c;
        }

        .quest-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border: 1px solid #d5dbe4;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #fff;
        }

        .quest-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .quest-text {
            font-size: 16px;
            word-break: break-word;
        }

        .quest-type-badge {
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 12px;
            color: white;
            flex-shrink: 0;
        }

        .daily-badge {
            background: #57a63e;
        }

        .weekly-badge {
            background: #5c94d6;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .game-delete-row {
            text-align: right;
            margin-top: 20px;
        }

        .game-delete-row button {
            background: #c0392b;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .empty-message {
            color: #777;
            font-size: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button class="back-btn" onclick="goBack()">← 돌아가기</button>
        설정
        <button class="save-btn" onclick="saveAndGoMain()">저장</button>
    </div>

    <div class="content">
        <div id="loginStatusBox" class="login-status-box">
            상태를 확인하는 중입니다.
        </div>

        <div class="top-row">
            <input type="text" id="newGameName" placeholder="추가할 게임 이름을 입력하세요">
            <button type="button" onclick="addGame()">+ 게임 추가</button>
        </div>

        <div id="gameList"></div>
    </div>
</div>

<script>
    const gameApi = "/api/games";
    const questApi = "/api/quests";
    const authApi = "/api/auth";
    const GUEST_STORAGE_KEY = "dailyQuestGuestData";

    let games = [];
    let isLoggedIn = false;
    const selectedQuestTypeByGame = {};

    let guestGames = [];
    let guestQuestsByGame = {};
    let guestGameIdSeq = 1;
    let guestQuestIdSeq = 1;

    function loadGuestDataFromSession() {
        try {
            const raw = sessionStorage.getItem(GUEST_STORAGE_KEY);

            if (!raw) {
                guestGames = [];
                guestQuestsByGame = {};
                guestGameIdSeq = 1;
                guestQuestIdSeq = 1;
                return;
            }

            const parsed = JSON.parse(raw);

            guestGames = Array.isArray(parsed.guestGames) ? parsed.guestGames : [];
            guestQuestsByGame = parsed.guestQuestsByGame && typeof parsed.guestQuestsByGame === "object"
                ? parsed.guestQuestsByGame
                : {};
            guestGameIdSeq = Number.isInteger(parsed.guestGameIdSeq) ? parsed.guestGameIdSeq : 1;
            guestQuestIdSeq = Number.isInteger(parsed.guestQuestIdSeq) ? parsed.guestQuestIdSeq : 1;
        } catch (error) {
            console.error("게스트 데이터 불러오기 실패:", error);
            guestGames = [];
            guestQuestsByGame = {};
            guestGameIdSeq = 1;
            guestQuestIdSeq = 1;
        }
    }

    function saveGuestDataToSession() {
        try {
            const data = {
                guestGames,
                guestQuestsByGame,
                guestGameIdSeq,
                guestQuestIdSeq
            };

            sessionStorage.setItem(GUEST_STORAGE_KEY, JSON.stringify(data));
        } catch (error) {
            console.error("게스트 데이터 저장 실패:", error);
        }
    }

    window.addEventListener("DOMContentLoaded", async () => {
        loadGuestDataFromSession();
        await checkLoginStatus();
    });

    async function checkLoginStatus() {
        try {
            const response = await fetch(`${authApi}/me`, {
                credentials: "include"
            });

            const data = await response.json();

            if (response.ok && data.loggedIn) {
                isLoggedIn = true;
                document.getElementById("loginStatusBox").textContent =
                    `${data.username}님 계정의 설정 화면입니다.`;
                await loadGames();
            } else {
                isLoggedIn = false;
                document.getElementById("loginStatusBox").textContent =
                    "게스트 모드입니다. 로그인 없이 사용할 수 있고, 같은 탭에서는 새로고침해도 유지됩니다. 브라우저 탭을 닫으면 데이터가 사라집니다.";
                loadGuestDataFromSession();
                renderGuestGames();
            }
        } catch (error) {
            console.error("로그인 상태 확인 실패:", error);
            isLoggedIn = false;
            document.getElementById("loginStatusBox").textContent =
                "게스트 모드입니다. 로그인 없이 사용할 수 있고, 같은 탭에서는 새로고침해도 유지됩니다. 브라우저 탭을 닫으면 데이터가 사라집니다.";
            loadGuestDataFromSession();
            renderGuestGames();
        }
    }

    async function loadGames() {
        try {
            const response = await fetch(gameApi, {
                credentials: "include"
            });

            const responseText = await response.text();

            if (!response.ok) {
                throw new Error(responseText || "게임 목록 조회 실패");
            }

            games = responseText ? JSON.parse(responseText) : [];

            for (const game of games) {
                if (!selectedQuestTypeByGame[game.id]) {
                    selectedQuestTypeByGame[game.id] = "DAILY";
                }

                try {
                    const questResponse = await fetch(`${questApi}/game/${game.id}`, {
                        credentials: "include"
                    });

                    const questText = await questResponse.text();

                    if (!questResponse.ok) {
                        throw new Error(questText || "퀘스트 조회 실패");
                    }

                    game.quests = questText ? JSON.parse(questText) : [];
                } catch (e) {
                    console.error(`게임 ${game.id} 퀘스트 조회 실패:`, e);
                    game.quests = [];
                }
            }

            renderGameList();
        } catch (error) {
            console.error("게임 목록 불러오기 실패:", error);
            alert(`게임 목록 불러오기 실패: ${error.message}`);
        }
    }

    function renderGuestGames() {
        renderGameList();
    }

    function getCurrentGames() {
        if (isLoggedIn) return games;
        return guestGames.map(game => ({
            ...game,
            quests: guestQuestsByGame[game.id] || []
        }));
    }

    function renderGameList() {
        const gameList = document.getElementById("gameList");
        gameList.innerHTML = "";

        const currentGames = getCurrentGames();

        if (currentGames.length === 0) {
            gameList.innerHTML = '<p class="empty-message">추가된 게임이 없습니다.</p>';
            return;
        }

        currentGames.forEach((game) => {
            const card = document.createElement("div");
            card.className = "game-card";

            const dailyQuests = (game.quests || []).filter(q => q.type === "DAILY");
            const weeklyQuests = (game.quests || []).filter(q => q.type === "WEEKLY");
            const currentType = selectedQuestTypeByGame[game.id] || "DAILY";

            card.innerHTML = `
                <div class="game-title">${escapeHtml(game.name)}</div>
                <div class="game-content">
                    <div class="reset-box">
                        <div class="reset-title">퀘스트 초기화 시간 설정</div>
                        <div class="reset-row">
                            <div class="reset-item">
                                <label for="dailyResetTime-${game.id}">일일 퀘스트 초기화 시간</label>
                                <input type="time" id="dailyResetTime-${game.id}" value="${game.dailyResetTime || '00:00'}">
                                <div class="reset-help">이 게임의 일일 퀘스트만 매일 초기화됩니다.</div>
                            </div>
                            <div class="reset-item">
                                <label for="weeklyResetTime-${game.id}">주간 퀘스트 초기화 시간</label>
                                <input type="time" id="weeklyResetTime-${game.id}" value="${game.weeklyResetTime || '00:00'}">
                                <div class="reset-help">이 게임의 주간 퀘스트만 매주 월요일 초기화됩니다.</div>
                            </div>
                        </div>

                        <div class="reset-action-row">
                            <button type="button" class="reset-confirm-btn" onclick="saveGameResetTimes(${game.id})">확인</button>
                            <span id="resetSaveMessage-${game.id}" class="reset-save-message"></span>
                        </div>
                    </div>

                    <div class="quest-add-row">
                        <input type="text" id="questInput-${game.id}" placeholder="퀘스트 내용을 입력하세요">
                        <div class="type-toggle">
                            <button type="button" class="${currentType === 'DAILY' ? 'active' : ''}" onclick="setQuestType(${game.id}, 'DAILY')">일일</button>
                            <button type="button" class="${currentType === 'WEEKLY' ? 'active' : ''}" onclick="setQuestType(${game.id}, 'WEEKLY')">주간</button>
                        </div>
                        <button type="button" class="add-btn" onclick="addQuest(${game.id})">+ 퀘스트 추가</button>
                    </div>

                    <div class="quest-section-label">일일 퀘스트</div>
                    <div>
                        ${dailyQuests.length === 0
                            ? '<div class="empty-message">등록된 일일 퀘스트가 없습니다.</div>'
                            : dailyQuests.map(q => `
                                <div class="quest-item">
                                    <div class="quest-left">
                                        <span class="quest-type-badge daily-badge">일일</span>
                                        <span class="quest-text">${escapeHtml(q.content)}</span>
                                    </div>
                                    <button type="button" class="delete-btn" onclick="deleteQuest(${q.id}, ${game.id})">삭제</button>
                                </div>
                            `).join("")
                        }
                    </div>

                    <div class="quest-section-label">주간 퀘스트</div>
                    <div>
                        ${weeklyQuests.length === 0
                            ? '<div class="empty-message">등록된 주간 퀘스트가 없습니다.</div>'
                            : weeklyQuests.map(q => `
                                <div class="quest-item">
                                    <div class="quest-left">
                                        <span class="quest-type-badge weekly-badge">주간</span>
                                        <span class="quest-text">${escapeHtml(q.content)}</span>
                                    </div>
                                    <button type="button" class="delete-btn" onclick="deleteQuest(${q.id}, ${game.id})">삭제</button>
                                </div>
                            `).join("")
                        }
                    </div>

                    <div class="game-delete-row">
                        <button type="button" onclick="deleteGame(${game.id})">게임 삭제</button>
                    </div>
                </div>
            `;

            gameList.appendChild(card);
        });
    }

    function setQuestType(gameId, type) {
        selectedQuestTypeByGame[gameId] = type;
        renderGameList();
    }

    async function addGame() {
    const input = document.getElementById("newGameName");
    const gameName = input.value.trim();

    if (!gameName) {
        alert("게임 이름을 입력해주세요.");
        return;
    }

    const currentGames = getCurrentGames();
    const exists = currentGames.some(game => game.name.toLowerCase() === gameName.toLowerCase());
    if (exists) {
        alert("이미 추가된 게임입니다.");
        return;
    }

    if (!isLoggedIn) {
        const gameId = guestGameIdSeq++;
        guestGames.push({
            id: gameId,
            name: gameName,
            dailyResetTime: "00:00",
            weeklyResetTime: "00:00"
        });
        guestQuestsByGame[gameId] = [];
        saveGuestDataToSession();
        input.value = "";
        renderGameList();
        return;
    }

    try {
        const response = await fetch(gameApi, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({
                name: gameName,
                dailyResetTime: "00:00",
                weeklyResetTime: "00:00"
            })
        });

        const responseText = await response.text();

        if (!response.ok) {
            throw new Error(responseText || "게임 추가 실패");
        }

        input.value = "";
        await loadGames();
    } catch (error) {
        console.error("게임 추가 실패:", error);
        alert(`게임 추가에 실패했습니다.\n${error.message}`);
    }
}

    async function saveGameResetTimes(gameId) {
        const dailyResetTime = document.getElementById(`dailyResetTime-${gameId}`).value;
        const weeklyResetTime = document.getElementById(`weeklyResetTime-${gameId}`).value;
        const messageEl = document.getElementById(`resetSaveMessage-${gameId}`);

        if (!dailyResetTime || !weeklyResetTime) {
            alert("일일/주간 초기화 시간을 모두 입력해주세요.");
            return;
        }

        if (!isLoggedIn) {
            const game = guestGames.find(g => g.id === gameId);
            if (game) {
                game.dailyResetTime = dailyResetTime;
                game.weeklyResetTime = weeklyResetTime;
                saveGuestDataToSession();
            }
            messageEl.textContent = "설정되었습니다.";
            setTimeout(() => messageEl.textContent = "", 2000);
            return;
        }

        try {
            const response = await fetch(`${gameApi}/${gameId}/reset-times`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({
                    dailyResetTime,
                    weeklyResetTime
                })
            });

            const responseText = await response.text();

            if (!response.ok) {
                throw new Error(responseText || "초기화 시간 저장 실패");
            }

            await loadGames();
            messageEl.textContent = "설정되었습니다.";
            setTimeout(() => messageEl.textContent = "", 2000);
        } catch (error) {
            console.error("초기화 시간 저장 실패:", error);
            alert(`초기화 시간 저장에 실패했습니다.\n${error.message}`);
        }
    }

    async function addQuest(gameId) {
        const input = document.getElementById(`questInput-${gameId}`);
        const content = input.value.trim();
        const type = selectedQuestTypeByGame[gameId] || "DAILY";

        if (!content) {
            alert("퀘스트 내용을 입력해주세요.");
            return;
        }

        if (!isLoggedIn) {
            if (!guestQuestsByGame[gameId]) {
                guestQuestsByGame[gameId] = [];
            }
            guestQuestsByGame[gameId].push({
                id: guestQuestIdSeq++,
                content,
                type,
                completed: false
            });
            saveGuestDataToSession();
            input.value = "";
            renderGameList();
            return;
        }

        try {
            const response = await fetch(questApi, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                credentials: "include",
                body: JSON.stringify({
                    gameId,
                    content,
                    type
                })
            });

            const responseText = await response.text();

            if (!response.ok) {
                throw new Error(responseText || "퀘스트 추가 실패");
            }

            input.value = "";
            await loadGames();
        } catch (error) {
            console.error("퀘스트 추가 실패:", error);
            alert(`퀘스트 추가에 실패했습니다.\n${error.message}`);
        }
    }

    async function deleteQuest(questId, gameId) {
        const ok = confirm("이 퀘스트를 삭제할까요?");
        if (!ok) return;

        if (!isLoggedIn) {
            guestQuestsByGame[gameId] = (guestQuestsByGame[gameId] || []).filter(q => q.id !== questId);
            saveGuestDataToSession();
            renderGameList();
            return;
        }

        try {
            const response = await fetch(`${questApi}/${questId}`, {
                method: "DELETE",
                credentials: "include"
            });

            const responseText = await response.text();

            if (!response.ok) {
                throw new Error(responseText || "퀘스트 삭제 실패");
            }

            await loadGames();
        } catch (error) {
            console.error("퀘스트 삭제 실패:", error);
            alert(`퀘스트 삭제에 실패했습니다.\n${error.message}`);
        }
    }

    async function deleteGame(gameId) {
        const ok = confirm("이 게임과 해당 퀘스트를 삭제할까요?");
        if (!ok) return;

        if (!isLoggedIn) {
            guestGames = guestGames.filter(g => g.id !== gameId);
            delete guestQuestsByGame[gameId];
            saveGuestDataToSession();
            renderGameList();
            return;
        }

        try {
            const response = await fetch(`${gameApi}/${gameId}`, {
                method: "DELETE",
                credentials: "include"
            });

            const responseText = await response.text();

            if (!response.ok) {
                throw new Error(responseText || "게임 삭제 실패");
            }

            await loadGames();
        } catch (error) {
            console.error("게임 삭제 실패:", error);
            alert(`게임 삭제에 실패했습니다.\n${error.message}`);
        }
    }

    function saveAndGoMain() {
        window.location.href = "/index.html";
    }

    function goBack() {
        window.location.href = "/index.html";
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
