<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Daily Quest Helper - 로그인</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            padding: 28px;
        }

        h1 {
            margin: 0 0 10px 0;
            text-align: center;
            color: #23497c;
        }

        .sub-text {
            text-align: center;
            color: #5f6b7a;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .mode-buttons button {
            padding: 10px 12px;
            border: 1px solid #cfd6df;
            background: #fff;
            color: #23497c;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .mode-buttons button.active {
            background: #3b73bd;
            color: white;
            border-color: #3b73bd;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group.hidden {
            display: none;
        }

        label {
            display: block;
            font-size: 14px;
            color: #334155;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cfd6df;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-row input {
            flex: 1;
        }

        .toggle-btn,
        .send-code-btn {
            white-space: nowrap;
            padding: 12px 14px;
            border: none;
            border-radius: 8px;
            background: #3b73bd;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .main-action {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #23497c;
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin-top: 4px;
        }

        .message {
            margin-top: 16px;
            white-space: pre-line;
            text-align: center;
            font-size: 14px;
            color: #d93025;
            min-height: 20px;
        }

        .message.success {
            color: #188038;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Daily Quest Helper</h1>
    <div id="description" class="sub-text"></div>

    <div class="mode-buttons">
        <button id="loginModeBtn" type="button" class="active" onclick="setMode('login')">로그인</button>
        <button id="registerModeBtn" type="button" onclick="setMode('register')">회원가입</button>
        <button id="findUsernameModeBtn" type="button" onclick="setMode('findUsername')">아이디 찾기</button>
        <button id="resetPasswordModeBtn" type="button" onclick="setMode('resetPassword')">비밀번호 재설정</button>
    </div>

    <div id="usernameGroup" class="input-group">
        <label for="username">아이디</label>
        <input type="text" id="username" placeholder="아이디를 입력하세요">
    </div>

    <div id="emailGroup" class="input-group hidden">
        <label for="email">이메일</label>
        <input type="email" id="email" placeholder="이메일을 입력하세요">
    </div>

    <div id="verificationCodeGroup" class="input-group hidden">
        <label for="verificationCode">이메일 인증코드</label>
        <div class="input-row">
            <input type="text" id="verificationCode" placeholder="인증코드를 입력하세요">
            <button type="button" id="sendCodeBtn" class="send-code-btn" onclick="sendVerificationCode()">인증코드 발송</button>
        </div>
    </div>

    <div id="passwordGroup" class="input-group">
        <label for="password">비밀번호</label>
        <div class="input-row">
            <input type="password" id="password" placeholder="비밀번호를 입력하세요">
            <button type="button" class="toggle-btn" onclick="togglePassword('password', this)">보기</button>
        </div>
    </div>

    <div id="confirmPasswordGroup" class="input-group hidden">
        <label for="confirmPassword">비밀번호 확인</label>
        <div class="input-row">
            <input type="password" id="confirmPassword" placeholder="비밀번호를 다시 입력하세요">
            <button type="button" class="toggle-btn" onclick="togglePassword('confirmPassword', this)">보기</button>
        </div>
    </div>

    <button id="submitBtn" class="main-action" type="button" onclick="submitAuth()">로그인</button>

    <div id="message" class="message"></div>
</div>

<script>
    const authApi = "/api/auth";
    let currentMode = "login";

    const usernameGroup = document.getElementById("usernameGroup");
    const emailGroup = document.getElementById("emailGroup");
    const verificationCodeGroup = document.getElementById("verificationCodeGroup");
    const passwordGroup = document.getElementById("passwordGroup");
    const confirmPasswordGroup = document.getElementById("confirmPasswordGroup");
    const submitBtn = document.getElementById("submitBtn");
    const message = document.getElementById("message");
    const description = document.getElementById("description");
    const sendCodeBtn = document.getElementById("sendCodeBtn");

    function setActiveButton(mode) {
        document.getElementById("loginModeBtn").classList.remove("active");
        document.getElementById("registerModeBtn").classList.remove("active");
        document.getElementById("findUsernameModeBtn").classList.remove("active");
        document.getElementById("resetPasswordModeBtn").classList.remove("active");

        if (mode === "login") document.getElementById("loginModeBtn").classList.add("active");
        if (mode === "register") document.getElementById("registerModeBtn").classList.add("active");
        if (mode === "findUsername") document.getElementById("findUsernameModeBtn").classList.add("active");
        if (mode === "resetPassword") document.getElementById("resetPasswordModeBtn").classList.add("active");
    }

    function resetInputs() {
        document.getElementById("username").value = "";
        document.getElementById("email").value = "";
        document.getElementById("verificationCode").value = "";
        document.getElementById("password").value = "";
        document.getElementById("confirmPassword").value = "";
        message.textContent = "";
        message.classList.remove("success");
    }

    function setMode(mode) {
        currentMode = mode;
        setActiveButton(mode);
        resetInputs();

        usernameGroup.classList.add("hidden");
        emailGroup.classList.add("hidden");
        verificationCodeGroup.classList.add("hidden");
        passwordGroup.classList.add("hidden");
        confirmPasswordGroup.classList.add("hidden");

        if (mode === "login") {
            usernameGroup.classList.remove("hidden");
            passwordGroup.classList.remove("hidden");
            submitBtn.textContent = "로그인";
            description.innerHTML =
                "로그인하면 사용자별로 게임과 퀘스트가 저장됩니다.<br>이메일 인증이 완료된 계정만 로그인할 수 있습니다.";
            return;
        }

        if (mode === "register") {
            usernameGroup.classList.remove("hidden");
            emailGroup.classList.remove("hidden");
            verificationCodeGroup.classList.remove("hidden");
            passwordGroup.classList.remove("hidden");
            confirmPasswordGroup.classList.remove("hidden");
            submitBtn.textContent = "회원가입";
            sendCodeBtn.textContent = "회원가입 코드 발송";
            description.innerHTML =
                "이메일로 받은 인증코드를 입력해야 회원가입할 수 있습니다.<br>인증코드는 5분 동안 유효합니다.";
            return;
        }

        if (mode === "findUsername") {
            emailGroup.classList.remove("hidden");
            verificationCodeGroup.classList.remove("hidden");
            submitBtn.textContent = "아이디 찾기";
            sendCodeBtn.textContent = "아이디 찾기 코드 발송";
            description.innerHTML =
                "이메일 인증 후 등록된 아이디를 일부만 표시합니다.<br>해당 이메일로 가입된 계정이 없으면 '사용자 계정이 없습니다.'가 표시됩니다.";
            return;
        }

        if (mode === "resetPassword") {
            emailGroup.classList.remove("hidden");
            verificationCodeGroup.classList.remove("hidden");
            passwordGroup.classList.remove("hidden");
            confirmPasswordGroup.classList.remove("hidden");
            submitBtn.textContent = "비밀번호 재설정";
            sendCodeBtn.textContent = "비밀번호 재설정 코드 발송";
            description.innerHTML =
                "기존 비밀번호는 확인할 수 없습니다.<br>이메일 인증 후 새 비밀번호로 변경됩니다.";
        }
    }

    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);

        if (input.type === "password") {
            input.type = "text";
            button.textContent = "숨기기";
        } else {
            input.type = "password";
            button.textContent = "보기";
        }
    }

    function containsSpecialCharacter(password) {
        return /[^a-zA-Z0-9]/.test(password);
    }

    function containsSequentialNumbers(password) {
        for (let i = 0; i < password.length - 2; i++) {
            const a = password[i];
            const b = password[i + 1];
            const c = password[i + 2];

            if (/\d/.test(a) && /\d/.test(b) && /\d/.test(c)) {
                const n1 = Number(a);
                const n2 = Number(b);
                const n3 = Number(c);

                const ascending = (n2 === n1 + 1) && (n3 === n2 + 1);
                const zeroWrap = (a === "8" && b === "9" && c === "0");
                const sameNumber = (a === b && b === c);
                const descending = (n2 === n1 - 1) && (n3 === n2 - 1);

                if (ascending || zeroWrap || sameNumber || descending) {
                    return true;
                }
            }
        }

        return false;
    }

    function validatePasswordRule(password, confirmPassword) {
        if (!password || !confirmPassword) {
            return "비밀번호와 비밀번호 확인을 모두 입력해주세요.";
        }

        if (password.length < 8) {
            return "비밀번호는 8자 이상이어야 합니다.";
        }

        if (!containsSpecialCharacter(password)) {
            return "비밀번호에는 특수문자가 최소 1개 포함되어야 합니다.";
        }

        if (containsSequentialNumbers(password)) {
            return "비밀번호에는 연속된 숫자를 사용할 수 없습니다.";
        }

        if (password !== confirmPassword) {
            return "비밀번호와 비밀번호 확인이 일치하지 않습니다.";
        }

        return null;
    }

    async function sendVerificationCode() {
        const email = document.getElementById("email").value.trim();

        if (!email) {
            message.textContent = "이메일을 입력해주세요.";
            message.classList.remove("success");
            return;
        }

        let endpoint = "";

        if (currentMode === "register") {
            endpoint = "/send-register-code";
        } else if (currentMode === "findUsername") {
            endpoint = "/send-find-username-code";
        } else if (currentMode === "resetPassword") {
            endpoint = "/send-reset-password-code";
        } else {
            message.textContent = "이메일 인증코드 발송이 필요한 화면이 아닙니다.";
            message.classList.remove("success");
            return;
        }

        try {
            const response = await fetch(`${authApi}${endpoint}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });

            const data = await response.json();

            if (!response.ok) {
                message.textContent = data.message || "인증코드 발송에 실패했습니다.";
                message.classList.remove("success");
                return;
            }

            message.textContent = data.message || "인증코드가 발송되었습니다.";
            message.classList.add("success");
        } catch (error) {
            console.error("인증코드 발송 실패:", error);
            message.textContent = "서버 통신에 실패했습니다.";
            message.classList.remove("success");
        }
    }

    async function submitAuth() {
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const verificationCode = document.getElementById("verificationCode").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (currentMode === "login") {
            if (!username || !password) {
                message.textContent = "아이디와 비밀번호를 입력해주세요.";
                message.classList.remove("success");
                return;
            }

            try {
                const response = await fetch(`${authApi}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "로그인에 실패했습니다.";
                    message.classList.remove("success");
                    return;
                }

                message.textContent = "로그인 성공";
                message.classList.add("success");

                setTimeout(() => {
                    window.location.href = "/index.html";
                }, 500);
            } catch (error) {
                console.error("로그인 처리 실패:", error);
                message.textContent = "서버 통신에 실패했습니다.";
                message.classList.remove("success");
            }

            return;
        }

        if (currentMode === "register") {
            if (!username || !email || !verificationCode || !password || !confirmPassword) {
                message.textContent = "아이디, 이메일, 인증코드, 비밀번호를 모두 입력해주세요.";
                message.classList.remove("success");
                return;
            }

            const validationMessage = validatePasswordRule(password, confirmPassword);
            if (validationMessage) {
                message.textContent = validationMessage;
                message.classList.remove("success");
                return;
            }

            try {
                const response = await fetch(`${authApi}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username,
                        email,
                        emailVerificationCode: verificationCode,
                        password,
                        confirmPassword
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "회원가입에 실패했습니다.";
                    message.classList.remove("success");
                    return;
                }

                message.textContent = "회원가입이 완료되었습니다. 로그인 해주세요.";
                message.classList.add("success");
                setMode("login");
            } catch (error) {
                console.error("회원가입 처리 실패:", error);
                message.textContent = "서버 통신에 실패했습니다.";
                message.classList.remove("success");
            }

            return;
        }

        if (currentMode === "findUsername") {
            if (!email || !verificationCode) {
                message.textContent = "이메일과 인증코드를 모두 입력해주세요.";
                message.classList.remove("success");
                return;
            }

            try {
                const response = await fetch(`${authApi}/find-username`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email,
                        verificationCode
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "아이디 찾기에 실패했습니다.";
                    message.classList.remove("success");
                    return;
                }

                message.textContent = `아이디를 찾았습니다.\n${data.maskedUsername}`;
                message.classList.add("success");
            } catch (error) {
                console.error("아이디 찾기 실패:", error);
                message.textContent = "서버 통신에 실패했습니다.";
                message.classList.remove("success");
            }

            return;
        }

        if (currentMode === "resetPassword") {
            if (!email || !verificationCode || !password || !confirmPassword) {
                message.textContent = "이메일, 인증코드, 새 비밀번호, 비밀번호 확인을 모두 입력해주세요.";
                message.classList.remove("success");
                return;
            }

            const validationMessage = validatePasswordRule(password, confirmPassword);
            if (validationMessage) {
                message.textContent = validationMessage;
                message.classList.remove("success");
                return;
            }

            try {
                const response = await fetch(`${authApi}/reset-password-by-email`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email,
                        verificationCode,
                        newPassword: password,
                        confirmPassword
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "비밀번호 재설정에 실패했습니다.";
                    message.classList.remove("success");
                    return;
                }

                message.textContent = "비밀번호가 재설정되었습니다. 새 비밀번호로 로그인해주세요.";
                message.classList.add("success");
                setMode("login");
            } catch (error) {
                console.error("비밀번호 재설정 실패:", error);
                message.textContent = "서버 통신에 실패했습니다.";
                message.classList.remove("success");
            }
        }
    }

    setMode("login");
</script>
</body>
</html>
