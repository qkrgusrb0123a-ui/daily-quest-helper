<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 / 회원가입</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
        }

        .container {
            width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(to bottom, #3c66a6, #2d4f84);
            color: white;
            padding: 20px 30px;
            text-align: center;
            position: relative;
            font-size: 24px;
            font-weight: bold;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 18px;
            background: transparent;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        .content {
            padding: 40px 30px;
            max-width: 420px;
            margin: 0 auto;
        }

        .tab-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #dfe7f3;
            color: #23497c;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #3b73bd;
            color: white;
        }

        .form-card {
            border: 1px solid #d5dbe4;
            border-radius: 8px;
            background: #f8fafc;
            padding: 24px;
        }

        .form-title {
            font-size: 22px;
            font-weight: bold;
            color: #23497c;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #23497c;
        }

        .input-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 6px;
            padding: 13px;
            cursor: pointer;
            background: #3b73bd;
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
        }

        .message {
            min-height: 22px;
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            color: #d9534f;
            font-weight: bold;
        }

        .message.success {
            color: #2e7d32;
        }

        .guide-box {
            margin-top: 20px;
            padding: 14px;
            border-radius: 6px;
            background: white;
            border: 1px solid #d5dbe4;
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button class="back-btn" onclick="goBack()">← 돌아가기</button>
        로그인 / 회원가입
    </div>

    <div class="content">
        <div class="tab-row">
            <button id="loginTabBtn" class="tab-btn active" onclick="setMode('login')">로그인</button>
            <button id="registerTabBtn" class="tab-btn" onclick="setMode('register')">회원가입</button>
        </div>

        <div class="form-card">
            <div id="formTitle" class="form-title">로그인</div>

            <div class="input-group">
                <label for="username">아이디</label>
                <input type="text" id="username" placeholder="아이디를 입력하세요">
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호를 입력하세요">
            </div>

            <button id="submitBtn" class="submit-btn" onclick="submitAuth()">로그인</button>

            <div id="message" class="message"></div>

            <div class="guide-box">
                로그인하면 사용자별로 게임과 퀘스트가 저장됩니다.<br>
                회원가입 시 비밀번호는 서버에서 암호화되어 저장됩니다.
            </div>
        </div>
    </div>
</div>

<script>
    const authApi = "/api/auth";
    let currentMode = "login";

    function setMode(mode) {
        currentMode = mode;

        const loginTabBtn = document.getElementById("loginTabBtn");
        const registerTabBtn = document.getElementById("registerTabBtn");
        const formTitle = document.getElementById("formTitle");
        const submitBtn = document.getElementById("submitBtn");
        const message = document.getElementById("message");

        if (mode === "login") {
            loginTabBtn.classList.add("active");
            registerTabBtn.classList.remove("active");
            formTitle.textContent = "로그인";
            submitBtn.textContent = "로그인";
        } else {
            registerTabBtn.classList.add("active");
            loginTabBtn.classList.remove("active");
            formTitle.textContent = "회원가입";
            submitBtn.textContent = "회원가입";
        }

        message.textContent = "";
        message.classList.remove("success");
    }

    async function submitAuth() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const message = document.getElementById("message");

        if (!username || !password) {
            message.textContent = "아이디와 비밀번호를 입력해주세요.";
            message.classList.remove("success");
            return;
        }

        try {
            const url = currentMode === "login"
                ? `${authApi}/login`
                : `${authApi}/register`;

            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok) {
                message.textContent = data.message || "처리에 실패했습니다.";
                message.classList.remove("success");
                return;
            }

            if (currentMode === "register") {
                message.textContent = "회원가입이 완료되었습니다. 로그인 해주세요.";
                message.classList.add("success");
                setMode("login");
                document.getElementById("password").value = "";
            } else {
                message.textContent = "로그인 성공";
                message.classList.add("success");
                setTimeout(() => {
                    window.location.href = "/index.html";
                }, 500);
            }
        } catch (error) {
            console.error("인증 처리 실패:", error);
            message.textContent = "서버 통신에 실패했습니다.";
            message.classList.remove("success");
        }
    }

    function goBack() {
        window.location.href = "/index.html";
    }
</script>
</body>
</html>
