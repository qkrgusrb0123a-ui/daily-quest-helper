<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 / 회원가입</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
        }

        .container {
            width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(to bottom, #3c66a6, #2d4f84);
            color: white;
            padding: 20px 30px;
            text-align: center;
            position: relative;
            font-size: 24px;
            font-weight: bold;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 18px;
            background: transparent;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        .content {
            padding: 40px 30px;
            max-width: 460px;
            margin: 0 auto;
        }

        .tab-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #dfe7f3;
            color: #23497c;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #3b73bd;
            color: white;
        }

        .form-card {
            border: 1px solid #d5dbe4;
            border-radius: 8px;
            background: #f8fafc;
            padding: 24px;
        }

        .form-title {
            font-size: 22px;
            font-weight: bold;
            color: #23497c;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #23497c;
        }

        .input-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
        }

        .password-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .password-row input {
            flex: 1;
        }

        .toggle-btn {
            white-space: nowrap;
            border: none;
            border-radius: 6px;
            background: #dfe7f3;
            color: #23497c;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 6px;
            padding: 13px;
            cursor: pointer;
            background: #3b73bd;
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
        }

        .message {
            min-height: 22px;
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            color: #d9534f;
            font-weight: bold;
            line-height: 1.5;
        }

        .message.success {
            color: #2e7d32;
        }

        .guide-box {
            margin-top: 20px;
            padding: 14px;
            border-radius: 6px;
            background: white;
            border: 1px solid #d5dbe4;
            color: #555;
            font-size: 14px;
            line-height: 1.7;
        }

        .hidden {
            display: none;
        }

        .rule-list {
            margin: 8px 0 0 18px;
            padding: 0;
        }

        .rule-list li {
            margin-bottom: 4px;
        }

        .field-hint {
            margin-top: 6px;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button class="back-btn" onclick="goBack()">← 돌아가기</button>
        로그인 / 회원가입
    </div>

    <div class="content">
        <div class="tab-row">
            <button id="loginTabBtn" class="tab-btn active" onclick="setMode('login')">로그인</button>
            <button id="registerTabBtn" class="tab-btn" onclick="setMode('register')">회원가입</button>
        </div>

        <div class="form-card">
            <div id="formTitle" class="form-title">로그인</div>

            <div class="input-group">
                <label for="username">아이디</label>
                <input type="text" id="username" placeholder="아이디를 입력하세요">
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <div class="password-row">
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요">
                    <button type="button" class="toggle-btn" onclick="togglePassword('password', this)">보기</button>
                </div>
                <div id="passwordHint" class="field-hint hidden">
                    비밀번호는 8자 이상, 특수문자 포함, 연속된 숫자 사용 불가입니다.
                </div>
            </div>

            <div id="confirmPasswordGroup" class="input-group hidden">
                <label for="confirmPassword">비밀번호 확인</label>
                <div class="password-row">
                    <input type="password" id="confirmPassword" placeholder="비밀번호를 다시 입력하세요">
                    <button type="button" class="toggle-btn" onclick="togglePassword('confirmPassword', this)">보기</button>
                </div>
            </div>

            <button id="submitBtn" class="submit-btn" onclick="submitAuth()">로그인</button>

            <div id="message" class="message"></div>

            <div class="guide-box">
                로그인하면 사용자별로 게임과 퀘스트가 저장됩니다.<br>
                회원가입 시 비밀번호는 서버에서 암호화되어 저장됩니다.
                <ul id="ruleBox" class="rule-list hidden">
                    <li>비밀번호는 최소 8자 이상</li>
                    <li>특수문자 최소 1개 포함</li>
                    <li>연속된 숫자 사용 금지 (예: 123, 456, 789, 890)</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    const authApi = "/api/auth";
    let currentMode = "login";

    function setMode(mode) {
        currentMode = mode;

        const loginTabBtn = document.getElementById("loginTabBtn");
        const registerTabBtn = document.getElementById("registerTabBtn");
        const formTitle = document.getElementById("formTitle");
        const submitBtn = document.getElementById("submitBtn");
        const message = document.getElementById("message");
        const confirmPasswordGroup = document.getElementById("confirmPasswordGroup");
        const passwordHint = document.getElementById("passwordHint");
        const ruleBox = document.getElementById("ruleBox");

        if (mode === "login") {
            loginTabBtn.classList.add("active");
            registerTabBtn.classList.remove("active");
            formTitle.textContent = "로그인";
            submitBtn.textContent = "로그인";
            confirmPasswordGroup.classList.add("hidden");
            passwordHint.classList.add("hidden");
            ruleBox.classList.add("hidden");
        } else {
            registerTabBtn.classList.add("active");
            loginTabBtn.classList.remove("active");
            formTitle.textContent = "회원가입";
            submitBtn.textContent = "회원가입";
            confirmPasswordGroup.classList.remove("hidden");
            passwordHint.classList.remove("hidden");
            ruleBox.classList.remove("hidden");
        }

        message.textContent = "";
        message.classList.remove("success");
    }

    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);

        if (input.type === "password") {
            input.type = "text";
            button.textContent = "숨기기";
        } else {
            input.type = "password";
            button.textContent = "보기";
        }
    }

    function containsSpecialCharacter(password) {
        return /[^a-zA-Z0-9]/.test(password);
    }

    function containsSequentialNumbers(password) {
        for (let i = 0; i < password.length - 2; i++) {
            const a = password[i];
            const b = password[i + 1];
            const c = password[i + 2];

            if (/\d/.test(a) && /\d/.test(b) && /\d/.test(c)) {
                const n1 = Number(a);
                const n2 = Number(b);
                const n3 = Number(c);

                const ascending = (n2 === n1 + 1) && (n3 === n2 + 1);
                const zeroWrap = (a === "8" && b === "9" && c === "0");

                if (ascending || zeroWrap) {
                    return true;
                }
            }
        }

        return false;
    }

    function validateRegisterForm(username, password, confirmPassword) {
        if (!username || !password || !confirmPassword) {
            return "아이디, 비밀번호, 비밀번호 확인을 모두 입력해주세요.";
        }

        if (password.length < 8) {
            return "비밀번호는 8자 이상이어야 합니다.";
        }

        if (!containsSpecialCharacter(password)) {
            return "비밀번호에는 특수문자가 최소 1개 포함되어야 합니다.";
        }

        if (containsSequentialNumbers(password)) {
            return "비밀번호에는 연속된 숫자를 사용할 수 없습니다.";
        }

        if (password !== confirmPassword) {
            return "비밀번호와 비밀번호 확인이 일치하지 않습니다.";
        }

        return null;
    }

    async function submitAuth() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const message = document.getElementById("message");

        if (currentMode === "login") {
            if (!username || !password) {
                message.textContent = "아이디와 비밀번호를 입력해주세요.";
                message.classList.remove("success");
                return;
            }

            try {
                const response = await fetch(`${authApi}/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "로그인에 실패했습니다.";
                    message.classList.remove("success");
                    return;
                }

                message.textContent = "로그인 성공";
                message.classList.add("success");

                setTimeout(() => {
                    window.location.href = "/index.html";
                }, 500);

            } catch (error) {
                console.error("로그인 처리 실패:", error);
                message.textContent = "서버 통신에 실패했습니다.";
                message.classList.remove("success");
            }

            return;
        }

        const validationMessage = validateRegisterForm(username, password, confirmPassword);
        if (validationMessage) {
            message.textContent = validationMessage;
            message.classList.remove("success");
            return;
        }

        try {
            const response = await fetch(`${authApi}/register`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    password,
                    confirmPassword
                })
            });

            const data = await response.json();

            if (!response.ok) {
                message.textContent = data.message || "회원가입에 실패했습니다.";
                message.classList.remove("success");
                return;
            }

            message.textContent = "회원가입이 완료되었습니다. 로그인 해주세요.";
            message.classList.add("success");

            document.getElementById("password").value = "";
            document.getElementById("confirmPassword").value = "";

            setMode("login");

        } catch (error) {
            console.error("회원가입 처리 실패:", error);
            message.textContent = "서버 통신에 실패했습니다.";
            message.classList.remove("success");
        }
    }

    function goBack() {
        window.location.href = "/index.html";
    }
</script>
</body>
</html>
