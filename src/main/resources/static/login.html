<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 / 회원가입 / 계정 찾기</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
        }

        .container {
            width: 900px;
            max-width: calc(100% - 32px);
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(to bottom, #3c66a6, #2d4f84);
            color: white;
            padding: 20px 30px;
            text-align: center;
            position: relative;
            font-size: 24px;
            font-weight: bold;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 18px;
            background: transparent;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        .content {
            padding: 40px 30px;
            max-width: 520px;
            margin: 0 auto;
        }

        .tab-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .sub-tab-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #dfe7f3;
            color: #23497c;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #3b73bd;
            color: white;
        }

        .form-card {
            border: 1px solid #d5dbe4;
            border-radius: 8px;
            background: #f8fafc;
            padding: 24px;
        }

        .form-title {
            font-size: 22px;
            font-weight: bold;
            color: #23497c;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #23497c;
        }

        .input-group input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
        }

        .password-row,
        .code-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .password-row input,
        .code-row input {
            flex: 1;
        }

        .toggle-btn,
        .send-code-btn {
            white-space: nowrap;
            border: none;
            border-radius: 6px;
            background: #dfe7f3;
            color: #23497c;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease, opacity 0.2s ease;
        }

        .send-code-btn:hover,
        .toggle-btn:hover,
        .submit-btn:hover,
        .tab-btn:hover,
        .back-btn:hover {
            opacity: 0.92;
        }

        .send-code-btn.loading {
            background: #9eb7db;
            color: white;
            cursor: wait;
        }

        .send-code-btn:disabled {
            opacity: 0.75;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            border: none;
            border-radius: 6px;
            padding: 13px;
            cursor: pointer;
            background: #3b73bd;
            color: white;
            font-size: 16px;
            font-weight: bold;
            margin-top: 8px;
        }

        .message {
            min-height: 22px;
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            color: #d9534f;
            font-weight: bold;
            line-height: 1.5;
            white-space: pre-line;
        }

        .message.success {
            color: #2e7d32;
        }

        .code-status {
            min-height: 18px;
            margin-top: 8px;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        .code-status.success {
            color: #2e7d32;
            font-weight: bold;
        }

        .code-status.error {
            color: #d9534f;
            font-weight: bold;
        }

        .guide-box {
            margin-top: 20px;
            padding: 14px;
            border-radius: 6px;
            background: white;
            border: 1px solid #d5dbe4;
            color: #555;
            font-size: 14px;
            line-height: 1.7;
        }

        .hidden {
            display: none;
        }

        .rule-list {
            margin: 8px 0 0 18px;
            padding: 0;
        }

        .rule-list li {
            margin-bottom: 4px;
        }

        .field-hint {
            margin-top: 6px;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        @media (max-width: 640px) {
            .header {
                font-size: 20px;
                padding: 18px 20px;
            }

            .back-btn {
                position: static;
                display: block;
                margin-bottom: 10px;
                text-align: left;
            }

            .content {
                padding: 24px 16px;
            }

            .code-row,
            .password-row {
                flex-direction: column;
                align-items: stretch;
            }

            .send-code-btn,
            .toggle-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button class="back-btn" onclick="goBack()">← 돌아가기</button>
        로그인 / 회원가입 / 계정 찾기
    </div>

    <div class="content">
        <div class="tab-row">
            <button id="loginTabBtn" class="tab-btn active" onclick="setMode('login')">로그인</button>
            <button id="registerTabBtn" class="tab-btn" onclick="setMode('register')">회원가입</button>
        </div>

        <div class="sub-tab-row">
            <button id="findUsernameTabBtn" class="tab-btn" onclick="setMode('findUsername')">아이디 찾기</button>
            <button id="resetPasswordTabBtn" class="tab-btn" onclick="setMode('resetPassword')">비밀번호 재설정</button>
        </div>

        <div class="form-card">
            <div id="formTitle" class="form-title">로그인</div>

            <div id="usernameGroup" class="input-group">
                <label for="username">아이디</label>
                <input type="text" id="username" placeholder="아이디를 입력하세요">
            </div>

            <div id="emailGroup" class="input-group hidden">
                <label for="email">이메일</label>
                <input type="email" id="email" placeholder="이메일을 입력하세요">
            </div>

            <div id="verificationCodeGroup" class="input-group hidden">
                <label for="verificationCode">이메일 인증코드</label>
                <div class="code-row">
                    <input type="text" id="verificationCode" placeholder="인증코드를 입력하세요">
                    <button type="button" id="sendCodeBtn" class="send-code-btn" onclick="sendVerificationCode()">인증코드 발송</button>
                </div>
                <div id="codeStatus" class="code-status"></div>
                <div class="field-hint">인증코드는 5분 동안 유효합니다.</div>
            </div>

            <div id="passwordGroup" class="input-group">
                <label for="password">비밀번호</label>
                <div class="password-row">
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요">
                    <button type="button" class="toggle-btn" onclick="togglePassword('password', this)">보기</button>
                </div>
                <div id="passwordHint" class="field-hint hidden">
                    비밀번호는 8자 이상, 특수문자 포함, 연속된 숫자/반복 숫자/내림차순 숫자 사용 불가입니다.
                </div>
            </div>

            <div id="confirmPasswordGroup" class="input-group hidden">
                <label for="confirmPassword">비밀번호 확인</label>
                <div class="password-row">
                    <input type="password" id="confirmPassword" placeholder="비밀번호를 다시 입력하세요">
                    <button type="button" class="toggle-btn" onclick="togglePassword('confirmPassword', this)">보기</button>
                </div>
            </div>

            <button id="submitBtn" class="submit-btn" onclick="submitAuth()">로그인</button>

            <div id="message" class="message"></div>

            <div class="guide-box">
                <div id="guideText">
                    로그인하면 사용자별로 게임과 퀘스트가 저장됩니다.<br>
                    회원가입 시 이메일 인증을 완료해야 계정이 생성됩니다.
                </div>
                <ul id="ruleBox" class="rule-list hidden">
                    <li>비밀번호는 최소 8자 이상</li>
                    <li>특수문자 최소 1개 포함</li>
                    <li>연속된 숫자 사용 금지 (예: 123, 456, 789, 890)</li>
                    <li>같은 숫자 반복 금지 (예: 111, 222)</li>
                    <li>내림차순 숫자 금지 (예: 321, 654)</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    const authApi = "/api/auth";
    let currentMode = "login";

    function setMode(mode) {
        currentMode = mode;

        const loginTabBtn = document.getElementById("loginTabBtn");
        const registerTabBtn = document.getElementById("registerTabBtn");
        const findUsernameTabBtn = document.getElementById("findUsernameTabBtn");
        const resetPasswordTabBtn = document.getElementById("resetPasswordTabBtn");

        const formTitle = document.getElementById("formTitle");
        const submitBtn = document.getElementById("submitBtn");
        const message = document.getElementById("message");

        const usernameGroup = document.getElementById("usernameGroup");
        const emailGroup = document.getElementById("emailGroup");
        const verificationCodeGroup = document.getElementById("verificationCodeGroup");
        const passwordGroup = document.getElementById("passwordGroup");
        const confirmPasswordGroup = document.getElementById("confirmPasswordGroup");
        const passwordHint = document.getElementById("passwordHint");
        const ruleBox = document.getElementById("ruleBox");
        const guideText = document.getElementById("guideText");
        const sendCodeBtn = document.getElementById("sendCodeBtn");

        [loginTabBtn, registerTabBtn, findUsernameTabBtn, resetPasswordTabBtn].forEach(btn => {
            btn.classList.remove("active");
        });

        usernameGroup.classList.add("hidden");
        emailGroup.classList.add("hidden");
        verificationCodeGroup.classList.add("hidden");
        passwordGroup.classList.add("hidden");
        confirmPasswordGroup.classList.add("hidden");
        passwordHint.classList.add("hidden");
        ruleBox.classList.add("hidden");

        if (mode === "login") {
            loginTabBtn.classList.add("active");
            formTitle.textContent = "로그인";
            submitBtn.textContent = "로그인";

            usernameGroup.classList.remove("hidden");
            passwordGroup.classList.remove("hidden");

            guideText.innerHTML =
                "로그인하면 사용자별로 게임과 퀘스트가 저장됩니다.<br>이메일 인증이 완료된 계정만 로그인할 수 있습니다.";
        } else if (mode === "register") {
            registerTabBtn.classList.add("active");
            formTitle.textContent = "회원가입";
            submitBtn.textContent = "회원가입";

            usernameGroup.classList.remove("hidden");
            emailGroup.classList.remove("hidden");
            verificationCodeGroup.classList.remove("hidden");
            passwordGroup.classList.remove("hidden");
            confirmPasswordGroup.classList.remove("hidden");
            passwordHint.classList.remove("hidden");
            ruleBox.classList.remove("hidden");
            sendCodeBtn.textContent = "회원가입 코드 발송";

            guideText.innerHTML =
                "이메일 인증코드를 먼저 발송한 뒤 회원가입을 완료해주세요.<br>메일이 보이지 않으면 스팸함도 확인해주세요.";
        } else if (mode === "findUsername") {
            findUsernameTabBtn.classList.add("active");
            formTitle.textContent = "아이디 찾기";
            submitBtn.textContent = "아이디 찾기";

            emailGroup.classList.remove("hidden");
            verificationCodeGroup.classList.remove("hidden");
            sendCodeBtn.textContent = "아이디 찾기 코드 발송";

            guideText.innerHTML =
                "이메일 인증 후 등록된 아이디를 일부만 표시합니다.<br>해당 이메일로 가입된 계정이 없으면 '사용자 계정이 없습니다.'가 표시됩니다.";
        } else if (mode === "resetPassword") {
            resetPasswordTabBtn.classList.add("active");
            formTitle.textContent = "비밀번호 재설정";
            submitBtn.textContent = "비밀번호 재설정";

            emailGroup.classList.remove("hidden");
            verificationCodeGroup.classList.remove("hidden");
            passwordGroup.classList.remove("hidden");
            confirmPasswordGroup.classList.remove("hidden");
            passwordHint.classList.remove("hidden");
            ruleBox.classList.remove("hidden");
            sendCodeBtn.textContent = "비밀번호 재설정 코드 발송";

            guideText.innerHTML =
                "기존 비밀번호는 확인할 수 없습니다.<br>이메일 인증 후 새 비밀번호로 변경됩니다.";
        }

        message.textContent = "";
        message.classList.remove("success");
        clearCodeStatus();
        clearFields();
    }

    function clearFields() {
        document.getElementById("username").value = "";
        document.getElementById("email").value = "";
        document.getElementById("verificationCode").value = "";
        document.getElementById("password").value = "";
        document.getElementById("confirmPassword").value = "";
    }

    function clearCodeStatus() {
        const codeStatus = document.getElementById("codeStatus");
        codeStatus.textContent = "";
        codeStatus.className = "code-status";
    }

    function setCodeStatus(text, type) {
        const codeStatus = document.getElementById("codeStatus");
        codeStatus.textContent = text;
        codeStatus.className = "code-status";

        if (type === "success") {
            codeStatus.classList.add("success");
        } else if (type === "error") {
            codeStatus.classList.add("error");
        }
    }

    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);

        if (input.type === "password") {
            input.type = "text";
            button.textContent = "숨기기";
        } else {
            input.type = "password";
            button.textContent = "보기";
        }
    }

    function containsSpecialCharacter(password) {
        return /[^a-zA-Z0-9]/.test(password);
    }

    function containsSequentialNumbers(password) {
        for (let i = 0; i < password.length - 2; i++) {
            const a = password[i];
            const b = password[i + 1];
            const c = password[i + 2];

            if (/\d/.test(a) && /\d/.test(b) && /\d/.test(c)) {
                const n1 = Number(a);
                const n2 = Number(b);
                const n3 = Number(c);

                const ascending = (n2 === n1 + 1) && (n3 === n2 + 1);
                const zeroWrap = (a === "8" && b === "9" && c === "0");
                const sameNumber = (a === b && b === c);
                const descending = (n2 === n1 - 1) && (n3 === n2 - 1);

                if (ascending || zeroWrap || sameNumber || descending) {
                    return true;
                }
            }
        }

        return false;
    }

    function validatePasswordRule(password, confirmPassword) {
        if (!password || !confirmPassword) {
            return "비밀번호와 비밀번호 확인을 모두 입력해주세요.";
        }

        if (password.length < 8) {
            return "비밀번호는 8자 이상이어야 합니다.";
        }

        if (!containsSpecialCharacter(password)) {
            return "비밀번호에는 특수문자가 최소 1개 포함되어야 합니다.";
        }

        if (containsSequentialNumbers(password)) {
            return "비밀번호에는 연속된 숫자를 사용할 수 없습니다.";
        }

        if (password !== confirmPassword) {
            return "비밀번호와 비밀번호 확인이 일치하지 않습니다.";
        }

        return null;
    }

    async function sendVerificationCode() {
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message");
        const sendCodeBtn = document.getElementById("sendCodeBtn");
        const originalBtnText = sendCodeBtn.textContent;

        clearCodeStatus();

        if (!email) {
            message.textContent = "이메일을 입력해주세요.";
            message.classList.remove("success");
            setCodeStatus("이메일을 먼저 입력해주세요.", "error");
            return;
        }

        let endpoint = "";

        if (currentMode === "register") {
            endpoint = "/send-register-code";
        } else if (currentMode === "findUsername") {
            endpoint = "/send-find-username-code";
        } else if (currentMode === "resetPassword") {
            endpoint = "/send-reset-password-code";
        } else {
            message.textContent = "이메일 인증코드 발송이 필요한 화면이 아닙니다.";
            message.classList.remove("success");
            setCodeStatus("현재 화면에서는 인증코드를 발송할 수 없습니다.", "error");
            return;
        }

        try {
            sendCodeBtn.disabled = true;
            sendCodeBtn.classList.add("loading");
            sendCodeBtn.textContent = "발송 중...";
            setCodeStatus("인증 메일 발송을 시도하고 있습니다...", "");

            const response = await fetch(`${authApi}${endpoint}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });

            const data = await response.json();

            if (!response.ok) {
                message.textContent = data.message || "인증코드 발송에 실패했습니다.";
                message.classList.remove("success");
                setCodeStatus(data.message || "인증코드 발송에 실패했습니다.", "error");
                return;
            }

            message.textContent = data.message || "인증코드가 발송되었습니다.";
            message.classList.add("success");
            setCodeStatus("인증 메일이 발송되었습니다. 메일함과 스팸함을 확인해주세요.", "success");
        } catch (error) {
            console.error("인증코드 발송 실패:", error);
            message.textContent = "서버 통신에 실패했습니다.";
            message.classList.remove("success");
            setCodeStatus("서버 통신에 실패했습니다. 잠시 후 다시 시도해주세요.", "error");
        } finally {
            sendCodeBtn.disabled = false;
            sendCodeBtn.classList.remove("loading");
            sendCodeBtn.textContent = originalBtnText;
        }
    }

    async function submitAuth() {
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const verificationCode = document.getElementById("verificationCode").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const message = document.getElementById("message");

        if (currentMode === "login") {
            if (!username || !password) {
                message.textContent = "아이디와 비밀번호를 입력해주세요.";
                message.classList.remove("success");
                return;
            }

            try {
                const response = await fetch(`${authApi}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "로그인에 실패했습니다.";
                    message.classList.remove("success");
                    return;
                }

                message.textContent = "로그인 성공";
                message.classList.add("success");

                setTimeout(() => {
                    window.location.href = "/index.html";
                }, 500);
            } catch (error) {
                console.error("로그인 처리 실패:", error);
                message.textContent = "서버 통신에 실패했습니다.";
                message.classList.remove("success");
            }

            return;
        }

        if (currentMode === "register") {
            if (!username || !email || !verificationCode || !password || !confirmPassword) {
                message.textContent = "아이디, 이메일, 인증코드, 비밀번호를 모두 입력해주세요.";
                message.classList.remove("success");
                return;
            }

            const validationMessage = validatePasswordRule(password, confirmPassword);
            if (validationMessage) {
                message.textContent = validationMessage;
                message.classList.remove("success");
                return;
            }

            try {
                const response = await fetch(`${authApi}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        confirmPassword,
                        emailVerificationCode: verificationCode
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "회원가입에 실패했습니다.";
                    message.classList.remove("success");
                    return;
                }

                message.textContent = "회원가입이 완료되었습니다. 로그인 해주세요.";
                message.classList.add("success");
                setMode("login");
            } catch (error) {
                console.error("회원가입 처리 실패:", error);
                message.textContent = "서버 통신에 실패했습니다.";
                message.classList.remove("success");
            }

            return;
        }

        if (currentMode === "findUsername") {
            if (!email || !verificationCode) {
                message.textContent = "이메일과 인증코드를 모두 입력해주세요.";
                message.classList.remove("success");
                return;
            }

            try {
                const response = await fetch(`${authApi}/find-username`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email,
                        verificationCode
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "아이디 찾기에 실패했습니다.";
                    message.classList.remove("success");
                    return;
                }

                message.textContent = `아이디를 찾았습니다.\n${data.maskedUsername}`;
                message.classList.add("success");
            } catch (error) {
                console.error("아이디 찾기 실패:", error);
                message.textContent = "서버 통신에 실패했습니다.";
                message.classList.remove("success");
            }

            return;
        }

        if (currentMode === "resetPassword") {
            if (!email || !verificationCode || !password || !confirmPassword) {
                message.textContent = "이메일, 인증코드, 새 비밀번호, 비밀번호 확인을 모두 입력해주세요.";
                message.classList.remove("success");
                return;
            }

            const validationMessage = validatePasswordRule(password, confirmPassword);
            if (validationMessage) {
                message.textContent = validationMessage;
                message.classList.remove("success");
                return;
            }

            try {
                const response = await fetch(`${authApi}/reset-password-by-email`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email,
                        verificationCode,
                        newPassword: password,
                        confirmPassword
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    message.textContent = data.message || "비밀번호 재설정에 실패했습니다.";
                    message.classList.remove("success");
                    return;
                }

                message.textContent = "비밀번호가 재설정되었습니다. 새 비밀번호로 로그인해주세요.";
                message.classList.add("success");
                setMode("login");
            } catch (error) {
                console.error("비밀번호 재설정 실패:", error);
                message.textContent = "서버 통신에 실패했습니다.";
                message.classList.remove("success");
            }
        }
    }

    function goBack() {
        window.location.href = "/index.html";
    }

    setMode("login");
</script>
</body>
</html>
