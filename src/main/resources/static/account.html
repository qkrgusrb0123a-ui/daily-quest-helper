<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>계정 설정</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f4f8;
}

.container {
    width: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    overflow: hidden;
}

.header {
    background: linear-gradient(to bottom, #3c66a6, #2d4f84);
    color: white;
    padding: 20px;
    text-align: center;
    position: relative;
    font-size: 24px;
    font-weight: bold;
}

.back-btn {
    position: absolute;
    left: 20px;
    top: 18px;
    padding: 8px 14px;
    background: #3b73bd;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.back-btn:hover {
    opacity: 0.9;
}

.content {
    padding: 30px;
}

.section {
    border: 1px solid #d5dbe4;
    border-radius: 6px;
    margin-bottom: 20px;
    padding: 20px;
    background: #fff;
}

.section-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 14px;
    color: #23497c;
}

.label {
    font-size: 14px;
    color: #4b5b70;
    margin-top: 10px;
    margin-bottom: 4px;
    font-weight: bold;
}

.current-email-box {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 1px solid #cfd6df;
    border-radius: 6px;
    background: #f7f9fc;
    color: #333;
    box-sizing: border-box;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: 1px solid #cfd6df;
    border-radius: 6px;
    box-sizing: border-box;
}

button {
    margin-top: 12px;
    padding: 10px 14px;
    background: #3b73bd;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    opacity: 0.92;
}

.danger {
    background: #e74c3c;
}

.logout {
    background: #555;
}

.info-text {
    margin-top: 8px;
    font-size: 13px;
    color: #6b7785;
}
</style>

</head>
<body>

<div class="container">

    <div class="header">
        <button class="back-btn" onclick="goBack()">← 돌아가기</button>
        계정 설정
    </div>

    <div class="content">

        <div class="section">
            <div class="section-title">계정 이름 변경</div>
            <input id="newUsername" placeholder="새 아이디 입력">
            <button onclick="updateUsername()">변경</button>
        </div>

        <div class="section">
            <div class="section-title">이메일 변경</div>

            <div class="label">현재 사용 중인 이메일</div>
            <div id="currentEmail" class="current-email-box">불러오는 중...</div>

            <div class="label">변경할 이메일</div>
            <input id="newEmail" type="email" placeholder="새 이메일 입력">

            <div class="label">비밀번호 확인</div>
            <input id="emailPassword" type="password" placeholder="현재 비밀번호 입력">

            <div class="info-text">이메일 변경 적용 시 현재 비밀번호를 입력해야 합니다.</div>

            <button onclick="updateEmail()">변경</button>
        </div>

        <div class="section">
            <div class="section-title">비밀번호 변경</div>

            <input id="currentPassword" type="password" placeholder="현재 비밀번호">
            <input id="newPassword" type="password" placeholder="새 비밀번호">
            <input id="confirmPassword" type="password" placeholder="새 비밀번호 확인">

            <button onclick="updatePassword()">변경</button>
        </div>

        <div class="section">
            <div class="section-title">계정 관리</div>

            <button class="logout" onclick="logout()">로그아웃</button>
            <button class="danger" onclick="deleteAccount()">회원탈퇴</button>
        </div>

    </div>
</div>

<script>
const authApi = "/api/auth";

document.addEventListener("DOMContentLoaded", async () => {
    await loadMyInfo();
});

function goBack() {
    location.href = "/index.html";
}

async function loadMyInfo() {
    try {
        const res = await fetch(authApi + "/me");

        if (!res.ok) {
            location.href = "/login.html";
            return;
        }

        const data = await res.json();
        document.getElementById("currentEmail").textContent = data.email || "-";
    } catch (e) {
        document.getElementById("currentEmail").textContent = "불러오기 실패";
    }
}

async function updateUsername() {
    const newUsername = document.getElementById("newUsername").value.trim();

    const res = await fetch(authApi + "/username", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ newUsername })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message || "아이디 변경 실패");
        return;
    }

    alert(data.message || "아이디 변경 완료");
    document.getElementById("newUsername").value = "";
}

async function updateEmail() {
    const newEmail = document.getElementById("newEmail").value.trim();
    const password = document.getElementById("emailPassword").value;

    const res = await fetch(authApi + "/email", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            newEmail,
            password
        })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message || "이메일 변경 실패");
        return;
    }

    alert(data.message || "이메일 변경 완료");

    document.getElementById("currentEmail").textContent = data.email || newEmail;
    document.getElementById("newEmail").value = "";
    document.getElementById("emailPassword").value = "";
}

async function updatePassword() {
    const currentPassword = document.getElementById("currentPassword").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    const res = await fetch(authApi + "/password", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            currentPassword,
            newPassword,
            confirmPassword
        })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message || "비밀번호 변경 실패");
        return;
    }

    alert(data.message || "비밀번호 변경 완료");

    document.getElementById("currentPassword").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("confirmPassword").value = "";
}

async function logout() {
    await fetch(authApi + "/logout", { method: "POST" });
    location.href = "/index.html";
}

async function deleteAccount() {
    if (!confirm("정말 탈퇴하시겠습니까?")) return;

    const res = await fetch(authApi + "/account", { method: "DELETE" });
    const data = await res.json();

    if (!res.ok) {
        alert(data.message || "탈퇴 실패");
        return;
    }

    alert(data.message || "탈퇴 완료");
    location.href = "/index.html";
}
</script>

</body>
</html>
