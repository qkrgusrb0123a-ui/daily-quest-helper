<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 일일 퀘스트 도우미</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
        }

        .container {
            width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(to bottom, #3c66a6, #2d4f84);
            color: white;
            padding: 20px 30px;
            font-size: 28px;
            font-weight: bold;
            position: relative;
            text-align: center;
        }

        .header-left-btn,
        .header-right-btn {
            position: absolute;
            top: 16px;
            background: #3b73bd;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .header-left-btn {
            left: 20px;
        }

        .header-right-btn {
            right: 20px;
        }

        .content {
            padding: 30px;
        }

        .status-box {
            margin-bottom: 20px;
            padding: 14px 16px;
            border: 1px solid #d5dbe4;
            border-radius: 6px;
            background: #f8fafc;
            color: #23497c;
            font-size: 16px;
        }

        .game-select-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .game-select-row label {
            font-size: 18px;
            font-weight: bold;
            color: #23497c;
        }

        select {
            width: 250px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #cfd6df;
            border-radius: 6px;
            background: white;
        }

        .quest-section {
            border: 1px solid #d5dbe4;
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .quest-section-title {
            background: #f1f3f7;
            padding: 16px 20px;
            font-size: 20px;
            font-weight: bold;
            color: #23497c;
            border-bottom: 1px solid #d5dbe4;
        }

        .quest-list {
            padding: 16px 20px;
        }

        .quest-item {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            font-size: 18px;
        }

        .quest-item:last-child {
            margin-bottom: 0;
        }

        .quest-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        .completed-text {
            text-decoration: line-through;
            color: #777;
        }

        .progress-wrapper {
            margin-top: 30px;
        }

        .progress-label {
            margin: 20px 0 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .progress-bar-bg {
            width: 100%;
            height: 24px;
            background: #e1e6ee;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #cdd5df;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .daily-fill {
            background: #57a63e;
        }

        .weekly-fill {
            background: #5c94d6;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
        }

        .empty-message {
            color: #777;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button id="authBtn" class="header-left-btn" onclick="handleAuthButton()">로그인</button>
        게임 일일 퀘스트 도우미
        <button class="header-right-btn" onclick="goToSettings()">설정</button>
    </div>

    <div class="content">
        <div id="statusBox" class="status-box">상태를 확인하는 중입니다.</div>

        <div class="game-select-row">
            <label for="gameSelect">게임 선택:</label>
            <select id="gameSelect" onchange="loadQuestsBySelectedGame()">
                <option value="">게임을 선택하세요</option>
            </select>
        </div>

        <div class="quest-section">
            <div class="quest-section-title">일일 퀘스트</div>
            <div class="quest-list" id="dailyQuestList">
                <div class="empty-message">표시할 일일 퀘스트가 없습니다.</div>
            </div>
        </div>

        <div class="quest-section">
            <div class="quest-section-title">주간 퀘스트</div>
            <div class="quest-list" id="weeklyQuestList">
                <div class="empty-message">표시할 주간 퀘스트가 없습니다.</div>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-label">일일 퀘스트 완료율</div>
            <div class="progress-bar-bg">
                <div id="dailyProgressBar" class="progress-bar-fill daily-fill"></div>
            </div>
            <div class="progress-text">
                <span id="dailyProgressText">0%</span>
            </div>

            <div class="progress-label">주간 퀘스트 완료율</div>
            <div class="progress-bar-bg">
                <div id="weeklyProgressBar" class="progress-bar-fill weekly-fill"></div>
            </div>
            <div class="progress-text">
                <span id="weeklyProgressText">0%</span>
            </div>
        </div>
    </div>
</div>

<script>
    const authApi = "/api/auth";
    const gameApi = "/api/games";
    const questApi = "/api/quests";
    const GUEST_STORAGE_KEY = "dailyQuestGuestData";

    let isLoggedIn = false;
    let currentUsername = "";

    let guestGames = [];
    let guestQuestsByGame = {};
    let guestGameIdSeq = 1;
    let guestQuestIdSeq = 1;

    function loadGuestDataFromSession() {
        try {
            const raw = sessionStorage.getItem(GUEST_STORAGE_KEY);

            if (!raw) {
                guestGames = [];
                guestQuestsByGame = {};
                guestGameIdSeq = 1;
                guestQuestIdSeq = 1;
                return;
            }

            const parsed = JSON.parse(raw);

            guestGames = Array.isArray(parsed.guestGames) ? parsed.guestGames : [];
            guestQuestsByGame = parsed.guestQuestsByGame && typeof parsed.guestQuestsByGame === "object"
                ? parsed.guestQuestsByGame
                : {};
            guestGameIdSeq = Number.isInteger(parsed.guestGameIdSeq) ? parsed.guestGameIdSeq : 1;
            guestQuestIdSeq = Number.isInteger(parsed.guestQuestIdSeq) ? parsed.guestQuestIdSeq : 1;
        } catch (error) {
            console.error("게스트 데이터 불러오기 실패:", error);
            guestGames = [];
            guestQuestsByGame = {};
            guestGameIdSeq = 1;
            guestQuestIdSeq = 1;
        }
    }

    function saveGuestDataToSession() {
        try {
            const data = {
                guestGames,
                guestQuestsByGame,
                guestGameIdSeq,
                guestQuestIdSeq
            };

            sessionStorage.setItem(GUEST_STORAGE_KEY, JSON.stringify(data));
        } catch (error) {
            console.error("게스트 데이터 저장 실패:", error);
        }
    }

    async function checkLoginStatus() {
        try {
            const response = await fetch(`${authApi}/me`);
            const data = await response.json();

            if (response.ok && data.loggedIn) {
                isLoggedIn = true;
                currentUsername = data.username || "";
                document.getElementById("authBtn").textContent = "계정 설정";
                document.getElementById("statusBox").innerHTML =
                    `👤 <b>${currentUsername}</b>님 | 계정 데이터 저장 중`;
                await loadGames();
            } else {
                setGuestMode();
            }
        } catch (error) {
            console.error("로그인 상태 확인 실패:", error);
            setGuestMode();
        }
    }

    function setGuestMode() {
        isLoggedIn = false;
        currentUsername = "";
        document.getElementById("authBtn").textContent = "로그인";
        document.getElementById("statusBox").innerHTML =
    `👤 <b>게스트</b> | 임시 데이터 (탭 종료 시 삭제)`;
    
        loadGuestDataFromSession();
        renderGuestGames();
    }

    function handleAuthButton() {
        if (!isLoggedIn) {
            window.location.href = "/login.html";
        } else {
            window.location.href = "/account.html";
        }
    }

    async function logout() {
        try {
            const response = await fetch(`${authApi}/logout`, {
                method: "POST"
            });

            if (!response.ok) {
                throw new Error("로그아웃 실패");
            }

            setGuestMode();
            clearQuestLists();
            updateProgressBars(0, 0);
        } catch (error) {
            console.error("로그아웃 실패:", error);
            alert("로그아웃에 실패했습니다.");
        }
    }

    async function loadGames() {
        if (!isLoggedIn) {
            renderGuestGames();
            return;
        }

        try {
            const response = await fetch(gameApi);

            if (!response.ok) {
                throw new Error("게임 목록 조회 실패");
            }

            const games = await response.json();
            const gameSelect = document.getElementById("gameSelect");
            gameSelect.innerHTML = "";

            if (!games || games.length === 0) {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "등록된 게임이 없습니다";
                option.selected = true;
                gameSelect.appendChild(option);
                clearQuestLists();
                updateProgressBars(0, 0);
                return;
            }

            games.forEach((game, index) => {
                const option = document.createElement("option");
                option.value = game.id;
                option.textContent = game.name;
                if (index === 0) option.selected = true;
                gameSelect.appendChild(option);
            });

            await loadQuestsBySelectedGame();
        } catch (error) {
            console.error("게임 목록 불러오기 실패:", error);
        }
    }

    function renderGuestGames() {
        const gameSelect = document.getElementById("gameSelect");
        gameSelect.innerHTML = "";

        if (guestGames.length === 0) {
            const option = document.createElement("option");
            option.value = "";
            option.textContent = "등록된 게임이 없습니다";
            option.selected = true;
            gameSelect.appendChild(option);
            clearQuestLists();
            updateProgressBars(0, 0);
            return;
        }

        guestGames.forEach((game, index) => {
            const option = document.createElement("option");
            option.value = game.id;
            option.textContent = game.name;
            if (index === 0) option.selected = true;
            gameSelect.appendChild(option);
        });

        loadQuestsBySelectedGame();
    }

    async function loadQuestsBySelectedGame() {
        const gameId = document.getElementById("gameSelect").value;

        if (!gameId) {
            clearQuestLists();
            updateProgressBars(0, 0);
            return;
        }

        if (!isLoggedIn) {
            const quests = guestQuestsByGame[gameId] || [];
            renderQuestLists(quests);
            loadProgressFromQuests(quests);
            return;
        }

        try {
            const response = await fetch(`${questApi}/game/${gameId}`);

            if (!response.ok) {
                throw new Error("퀘스트 목록 조회 실패");
            }

            const quests = await response.json();
            renderQuestLists(quests);
            loadProgressFromQuests(quests);
        } catch (error) {
            console.error("퀘스트 목록 불러오기 실패:", error);
            clearQuestLists();
            updateProgressBars(0, 0);
        }
    }

    function renderQuestLists(quests) {
        const dailyQuestList = document.getElementById("dailyQuestList");
        const weeklyQuestList = document.getElementById("weeklyQuestList");

        dailyQuestList.innerHTML = "";
        weeklyQuestList.innerHTML = "";

        const dailyQuests = quests.filter(q => q.type === "DAILY");
        const weeklyQuests = quests.filter(q => q.type === "WEEKLY");

        if (dailyQuests.length === 0) {
            dailyQuestList.innerHTML = '<div class="empty-message">표시할 일일 퀘스트가 없습니다.</div>';
        } else {
            dailyQuests.forEach(quest => {
                dailyQuestList.appendChild(createQuestItem(quest));
            });
        }

        if (weeklyQuests.length === 0) {
            weeklyQuestList.innerHTML = '<div class="empty-message">표시할 주간 퀘스트가 없습니다.</div>';
        } else {
            weeklyQuests.forEach(quest => {
                weeklyQuestList.appendChild(createQuestItem(quest));
            });
        }
    }

    function createQuestItem(quest) {
        const item = document.createElement("div");
        item.className = "quest-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = quest.completed;
        checkbox.onchange = () => toggleQuest(quest.id);

        const text = document.createElement("span");
        text.textContent = quest.content;
        if (quest.completed) {
            text.classList.add("completed-text");
        }

        item.appendChild(checkbox);
        item.appendChild(text);
        return item;
    }

    async function toggleQuest(questId) {
        const gameId = document.getElementById("gameSelect").value;

        if (!isLoggedIn) {
            const quests = guestQuestsByGame[gameId] || [];
            const target = quests.find(q => q.id === Number(questId));

            if (target) {
                target.completed = !target.completed;
                saveGuestDataToSession();
            }

            renderQuestLists(quests);
            loadProgressFromQuests(quests);
            return;
        }

        try {
            const response = await fetch(`${questApi}/${questId}/toggle`, {
                method: "PUT"
            });

            if (!response.ok) {
                throw new Error("퀘스트 체크 상태 변경 실패");
            }

            await loadQuestsBySelectedGame();
        } catch (error) {
            console.error("퀘스트 체크 상태 변경 실패:", error);
            alert("퀘스트 체크 상태 변경에 실패했습니다.");
        }
    }

    function loadProgressFromQuests(quests) {
        const dailyQuests = quests.filter(q => q.type === "DAILY");
        const weeklyQuests = quests.filter(q => q.type === "WEEKLY");

        const dailyCompleted = dailyQuests.filter(q => q.completed).length;
        const weeklyCompleted = weeklyQuests.filter(q => q.completed).length;

        const dailyProgress = dailyQuests.length === 0 ? 0 : Math.round((dailyCompleted * 100) / dailyQuests.length);
        const weeklyProgress = weeklyQuests.length === 0 ? 0 : Math.round((weeklyCompleted * 100) / weeklyQuests.length);

        updateProgressBars(dailyProgress, weeklyProgress);
    }

    function updateProgressBars(daily, weekly) {
        document.getElementById("dailyProgressBar").style.width = `${daily}%`;
        document.getElementById("weeklyProgressBar").style.width = `${weekly}%`;
        document.getElementById("dailyProgressText").textContent = `${daily}%`;
        document.getElementById("weeklyProgressText").textContent = `${weekly}%`;
    }

    function clearQuestLists() {
        document.getElementById("dailyQuestList").innerHTML =
            '<div class="empty-message">표시할 일일 퀘스트가 없습니다.</div>';
        document.getElementById("weeklyQuestList").innerHTML =
            '<div class="empty-message">표시할 주간 퀘스트가 없습니다.</div>';
    }

    function goToSettings() {
        window.location.href = "/settings.html";
    }

    window.addEventListener("DOMContentLoaded", async () => {
        loadGuestDataFromSession();
        await checkLoginStatus();
    });
</script>
</body>
</html>
